<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Workspace Chat</title>
    <style>
        :root {
            --bg-outer: #f4f5f6;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --border: #f0f0f2;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --accent: #000000;
            --accent-text: #ffffff;
            --bubble-in: #ffffff;
            --bubble-in-border: #e1e4e8;
            --bubble-out: #f0f2f5;
            --badge-bg: #fff8ec;
            --badge-text: #b07d1a;
            --icon-color: #636c76;
            
            --tg-voice-bg: #f4f5f7;
            --tg-voice-btn: #2481cc;
            --tg-voice-btn-icon: #ffffff;
            --tg-voice-seek: #d0d5dd;
            --tg-voice-progress: #2481cc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-outer: #0a0b0d;
                --bg-card: #16181c;
                --bg-input: #22262c;
                --border: #2d3139;
                --text-main: #e6edf3;
                --text-muted: #8b949e;
                --accent: #ffffff;
                --accent-text: #16181c;
                --bubble-in: #1f242c;
                --bubble-in-border: #2d3139;
                --bubble-out: #282e38;
                --badge-bg: #2c2214;
                --badge-text: #e3b341;
                --icon-color: #8b949e;

                --tg-voice-bg: #1a222c;
                --tg-voice-btn: #5288c1;
                --tg-voice-btn-icon: #ffffff;
                --tg-voice-seek: #343e4d;
                --tg-voice-progress: #5288c1;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-outer);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            padding: 20px;
        }

        .workspace {
            width: 100%;
            max-width: 960px;
            height: 100%;
            background-color: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
            background-color: var(--bg-card);
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .status-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--badge-text);
            border-radius: 50%;
        }
        .status-badge.connected {
            background-color: rgba(35, 165, 90, 0.1);
            color: #23a55a;
        }
        .status-badge.connected::before {
            background-color: #23a55a;
        }
        .status-badge.typing {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .status-badge.typing::before {
            background-color: var(--text-muted);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.3; } to { opacity: 1; }
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .p2p-panel {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            background-color: var(--bg-card);
            z-index: 30;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .p2p-panel.collapsed {
            margin-left: -300px;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 8px;
        }

        .p2p-panel button {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .p2p-panel button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .p2p-panel button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .p2p-panel button.danger-link {
            background-color: transparent;
            border: 1px dashed rgba(255, 77, 79, 0.3);
            color: #ff4d4f;
            margin-top: auto;
            padding: 8px;
        }

        select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            height: 60px;
            background-color: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 0.8rem;
            resize: none;
            outline: none;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            overflow: hidden;
            height: 100%;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }
        .msg-wrapper.in { align-self: flex-start; }
        .msg-wrapper.out { align-self: flex-end; }

        .msg-box {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }
        .msg-wrapper.in .msg-box {
            background-color: var(--bubble-in);
            color: var(--text-main);
            border: 1px solid var(--bubble-in-border);
            border-top-left-radius: 4px;
        }
        .msg-wrapper.out .msg-box {
            background-color: var(--bubble-out);
            color: var(--text-main);
            border-top-right-radius: 4px;
        }

        .msg-box img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .tg-voice-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--tg-voice-bg);
            padding: 8px 14px;
            border-radius: 14px;
            min-width: 220px;
            margin-top: 4px;
            user-select: none;
        }

        .tg-play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: var(--tg-voice-btn);
            color: var(--tg-voice-btn-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tg-voice-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tg-timeline {
            position: relative;
            height: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .tg-waveform-bg {
            width: 100%;
            height: 3px;
            background-color: var(--tg-voice-seek);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .tg-waveform-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--tg-voice-progress);
            transition: width 0.1s linear;
        }

        .tg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            margin-top: 4px;
        }

        .modes-bar {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        
        .modes-left {
            display: flex;
            gap: 8px;
        }

        .pill-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }
        .pill-btn.active {
            background-color: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        .input-container {
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 16px;
            gap: 12px;
        }

        .input-wrapper input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.95rem;
            height: 40px;
        }

        .input-icon {
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-icon.recording {
            color: #ff4d4f;
            animation: pulse 0.8s infinite alternate;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--border);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .btn-send.active {
            background-color: var(--accent);
            color: var(--accent-text);
        }

        /* Полная адаптивность под мобильные устройства: фиксированные бары */
        @media (max-width: 680px) {
            body { padding: 0; }
            .workspace {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            .header {
                position: sticky;
                top: 0;
            }
            .input-container {
                position: sticky;
                bottom: 0;
                padding-bottom: cubic-bezier(0.1, 0.76, 0.55, 0.94);
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
            .p2p-panel { 
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 290px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
                transform: translateX(-100%);
                margin-left: 0 !important;
            }
            .p2p-panel.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="header">
            <div class="header-title">P2P Workspace Pro</div>
            <div class="header-controls">
                <div id="status" class="status-badge">Ожидание p2p</div>
                <button class="btn-icon" onclick="togglePanel()" title="Конфигурация шлюза">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1  1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="p2p-panel" id="p2pPanel">
                <div class="panel-title">Шаг 1: Инициализация</div>
                <button onclick="createOffer()">Создать комнату</button>
                
                <div class="panel-title">Ваш токен связи:</div>
                <textarea id="localKey" readonly placeholder="Токен сгенерируется автоматически"></textarea>
                
                <div class="panel-title">Шаг 2: Удалённый узел</div>
                <textarea id="remoteKey" placeholder="Вставьте токен пира или перейдите по шеринг-ссылке"></textarea>
                <button onclick="acceptRemoteKey()">Подключить токен</button>
                
                <div class="panel-title">Параметры безопасности</div>
                <label class="panel-title" style="display:block; margin-bottom:4px;">Шифрование</label>
                <select id="cryptoType">
                    <option value="webrtc">Стандартное (WebRTC DTLS/SRTP)</option>
                    <option value="aes256">Дополнительное (AES-GCM 256-bit на клиенте)</option>
                </select>

                <label class="panel-title" style="display:block; margin-top:8px; margin-bottom:4px;">ICE-Инфраструктура</label>
                <select id="iceConfig" onchange="updateIceConfig()">
                    <option value="google">Google STUN (Внешняя сеть)</option>
                    <option value="public">Public STUN/TURN (Обход NAT)</option>
                    <option value="local">Localhost / LAN (Без выхода в интернет)</option>
                </select>
                
                <div class="panel-title">Быстрое подключение</div>
                <button class="secondary" id="btnShareCode" onclick="shareConnectionLink()">🔗 Поделиться ссылкой</button>
                
                <button class="danger-link" onclick="clearHistory()">🗑 Очистить историю чата</button>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messages"></div>

                <div class="modes-bar">
                    <div class="modes-left">
                        <button class="pill-btn active">💬 Диалог</button>
                        <button class="pill-btn" onclick="alert('Канал защищен сквозным туннелированием в ОЗУ вашего браузера.')">🔒 Безопасность</button>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <input type="file" id="fileField" onchange="handleFileSelect(this)" style="display:none">
                        
                        <div class="input-icon" onclick="document.getElementById('fileField').click()" title="Выбрать файл">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </div>
                        
                        <div class="input-icon" id="micBtn" onclick="toggleVoiceRecord()" title="Голосовое сообщение" style="opacity: 0.5; cursor: not-allowed;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </div>
                        
                        <input type="text" id="msgInput" placeholder="Введите текст сообщения..." oninput="sendTypingSignal()" onkeydown="if(event.key === 'Enter') sendMessage()" disabled>
                        
                        <button id="btnSend" class="btn-send" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peerConnection;
        let dataChannel;
        let typingTimeout;
        let isConnectedState = false;
        let chatHistory = [];
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        let currentIceServers = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ];

        // Автоматический парсинг входящей шеринг-ссылки при загрузке страницы
        window.addEventListener('DOMContentLoaded', async () => {
            const saved = localStorage.getItem('p2p_chat_history');
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(msg => {
                        if (msg.msgType === 'text') renderTextMessage(msg.payload, msg.side);
                        else if (msg.msgType === 'file') renderFileMessage(msg.filename, msg.filetype, msg.payload, msg.side);
                    });
                } catch (e) { console.error(e); }
            } else {
                renderTextMessage("Чат готов к работе.", 'in');
            }

            // Проверяем наличие хэша (токена создателя) в URL
            if (window.location.hash && window.location.hash.length > 1) {
                const incomingToken = window.location.hash.substring(1);
                document.getElementById('remoteKey').value = incomingToken;
                
                // Автоматически разворачиваем панель для наглядности процесса подключения
                document.getElementById('p2pPanel').classList.add('open');
                setStatus('Обнаружена ссылка. Подключаемся...');
                
                // Шаг 2 для принимающей стороны: создаем Answer на основе полученного Offer
                try {
                    const remoteDesc = JSON.parse(atob(incomingToken));
                    peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
                    peerConnection.ondatachannel = (e) => setupDataChannel(e.channel);
                    bindPeerEvents(peerConnection);
                    
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    // Генерируем ответный ключ
                    setTimeout(() => {
                        const sdpData = { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp };
                        const responseToken = btoa(JSON.stringify(sdpData));
                        document.getElementById('localKey').value = responseToken;
                        
                        // Копируем ответный токен в буфер, чтобы создателю осталось просто нажать "Вставить"
                        navigator.clipboard.writeText(responseToken).then(() => {
                            alert("Вы успешно открыли комнату! Ответный токен скопирован в буфер обмена. Отправьте его создателю.");
                        }).catch(() => {
                            alert("Вы подключились. Скопируйте 'Ваш токен связи' и передайте создателю.");
                        });
                    }, 500);

                } catch(e) {
                    setStatus('Ошибка разбора ссылки');
                }
            }
        });

        // Функция быстрой отправки инвайт-ссылки через системный Share-меню телефона
        async function shareConnectionLink() {
            const localKeyVal = document.getElementById('localKey').value.trim();
            if (!localKeyVal) {
                alert("Сначала нажмите кнопку 'Создать комнату', чтобы сгенерировать токен!");
                return;
            }

            // Создаем прямую ссылку с хэшем токена
            const shareUrl = `${window.location.origin}${window.location.pathname}#${localKeyVal}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Подключение к P2P Workspace',
                        text: 'Перейди по ссылке, чтобы мгновенно подключиться к защищенному P2P чату:',
                        url: shareUrl
                    });
                } catch (err) {
                    console.log("Пользователь отменил шеринг или произошел сбой");
                }
            } else {
                // Фоллбэк, если браузер не поддерживает Web Share API
                await navigator.clipboard.writeText(shareUrl);
                alert("Ссылка скопирована в буфер обмена. Отправьте её вашему пиру.");
            }
        }

        function updateIceConfig() {
            const type = document.getElementById('iceConfig').value;
            if (type === 'google') currentIceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
            else if (type === 'public') currentIceServers = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.ekiga.net' }];
            else if (type === 'local') currentIceServers = [];
        }

        function saveToStorage(messageObject) {
            chatHistory.push(messageObject);
            try { localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory)); } catch(e) { chatHistory.shift(); }
        }

        function clearHistory() {
            if (confirm("Удалить историю чата на этом устройстве?")) {
                localStorage.removeItem('p2p_chat_history');
                chatHistory = [];
                document.getElementById('messages').innerHTML = '';
                renderTextMessage("История очищена.", 'in');
            }
        }

        function setStatus(text, state = 'default') {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.className = 'status-badge'; 
            if (state === 'connected') statusEl.classList.add('connected');
            if (state === 'typing') statusEl.classList.add('typing');
        }

        function togglePanel() {
            const panel = document.getElementById('p2pPanel');
            if (window.innerWidth <= 680) panel.classList.toggle('open');
            else panel.classList.toggle('collapsed');
        }

        function generateLocalToken() {
            if (!peerConnection || !peerConnection.localDescription) return;
            const sdpData = { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp };
            document.getElementById('localKey').value = btoa(JSON.stringify(sdpData));
        }

        function toggleInterfaceStates(enabled) {
            document.getElementById('msgInput').disabled = !enabled;
            const sendBtn = document.getElementById('btnSend');
            sendBtn.disabled = !enabled;
            if(enabled) sendBtn.classList.add('active'); else sendBtn.classList.remove('active');
            
            const micBtn = document.getElementById('micBtn');
            if(enabled) { micBtn.style.opacity = "1"; micBtn.style.cursor = "pointer"; } 
            else { micBtn.style.opacity = "0.5"; micBtn.style.cursor = "not-allowed"; }
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            dataChannel.onopen = () => {
                isConnectedState = true;
                setStatus('В сети', 'connected');
                toggleInterfaceStates(true);
                document.getElementById('p2pPanel').classList.remove('open');
                // Очищаем хэш в целях безопасности
                window.history.replaceState(null, null, ' ');
            };
            dataChannel.onclose = () => {
                isConnectedState = false;
                setStatus('Разъединено');
                toggleInterfaceStates(false);
            };
            dataChannel.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'typing') {
                        setStatus(data.isTyping ? 'Печатает...' : 'В сети', data.isTyping ? 'typing' : 'connected');
                    } else if (data.type === 'text') {
                        renderTextMessage(data.payload, 'in');
                        saveToStorage({ msgType: 'text', payload: data.payload, side: 'in' });
                    } else if (data.type === 'file') {
                        renderFileMessage(data.filename, data.filetype, data.payload, 'in');
                        saveToStorage({ msgType: 'file', filename: data.filename, filetype: data.filetype, payload: data.payload, side: 'in' });
                    }
                } catch(err) {
                    renderTextMessage(e.data, 'in');
                    saveToStorage({ msgType: 'text', payload: e.data, side: 'in' });
                }
            };
        }

        function bindPeerEvents(pc) {
            pc.onicecandidate = (e) => {
                generateLocalToken();
                if (!e.candidate) setStatus(pc.localDescription.type === 'offer' ? 'Токен создан' : 'Ответ готов');
            };
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'checking') setStatus('Соединение...');
                if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') setStatus('В сети', 'connected');
                if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') setStatus('Разъединено');
            };
        }

        async function createOffer() {
            peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
            setupDataChannel(peerConnection.createDataChannel("chat"));
            bindPeerEvents(peerConnection);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            generateLocalToken();
        }

        async function acceptRemoteKey() {
            const rawKey = document.getElementById('remoteKey').value.trim();
            if (!rawKey) return alert('Пожалуйста, вставьте токен!');
            try {
                const remoteDesc = JSON.parse(atob(rawKey));
                if (!peerConnection) {
                    peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
                    peerConnection.ondatachannel = (e) => setupDataChannel(e.channel);
                    bindPeerEvents(peerConnection);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    generateLocalToken();
                } else {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                }
            } catch (err) { alert('Ошибка разбора токена.'); }
        }

        function sendTypingSignal() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            dataChannel.send(JSON.stringify({ type: 'typing', isTyping: true }));
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                dataChannel.send(JSON.stringify({ type: 'typing', isTyping: false }));
            }, 1500);
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
            
            dataChannel.send(JSON.stringify({ type: 'text', payload: text }));
            renderTextMessage(text, 'out');
            saveToStorage({ msgType: 'text', payload: text, side: 'out' });
            
            input.value = '';
            dataChannel.send(JSON.stringify({ type: 'typing', isTyping: false }));
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file || !dataChannel || dataChannel.readyState !== 'open') return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                let binary = '';
                const bytes = new Uint8Array(arrayBuffer);
                const len = bytes.byteLength;
                for (let i = 0; i < len; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                
                let finalMime = file.type || "application/octet-stream";
                const base64Payload = `data:${finalMime};base64,` + btoa(binary);

                const packet = { 
                    type: 'file', 
                    filename: file.name || "Файл", 
                    filetype: finalMime, 
                    payload: base64Payload 
                };
                
                try {
                    dataChannel.send(JSON.stringify(packet));
                    renderFileMessage(packet.filename, packet.filetype, base64Payload, 'out');
                    saveToStorage({ msgType: 'file', filename: packet.filename, filetype: packet.filetype, payload: base64Payload, side: 'out' });
                } catch(err) {
                    alert("Размер файла превышает лимит прямой передачи.");
                }
                input.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        async function toggleVoiceRecord() {
            if (!isConnectedState || !dataChannel || dataChannel.readyState !== 'open') return;
            const micBtn = document.getElementById('micBtn');
            const inputField = document.getElementById('msgInput');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64Data = reader.result;
                            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            const filename = `Голосовое сообщение (${timestamp}).wav`;
                            const packet = { type: 'file', filename: filename, filetype: 'audio/wav', payload: base64Data };
                            dataChannel.send(JSON.stringify(packet));
                            renderFileMessage(filename, 'audio/wav', base64Data, 'out');
                            saveToStorage({ msgType: 'file', filename: filename, filetype: 'audio/wav', payload: base64Data, side: 'out' });
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    inputField.placeholder = "Запись... Нажмите на микрофон для отправки";
                    inputField.disabled = true;
                } catch (err) { alert('Микрофон недоступен.'); }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                inputField.placeholder = "Введите текст сообщения...";
                inputField.disabled = false;
            }
        }

        function renderTextMessage(text, side) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            const box = document.createElement('div');
            box.className = 'msg-box';
            box.innerText = text;
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function initTelegramAudioPlayer(container, srcUrl) {
            const audio = new Audio(srcUrl);
            const playerView = document.createElement('div');
            playerView.className = 'tg-voice-player';

            const playBtn = document.createElement('button');
            playBtn.className = 'tg-play-btn';
            playBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

            const infoNode = document.createElement('div');
            infoNode.className = 'tg-voice-info';

            const timeline = document.createElement('div');
            timeline.className = 'tg-timeline';
            timeline.innerHTML = '<div class="tg-waveform-bg"><div class="tg-waveform-progress"></div></div>';
            const progressLine = timeline.querySelector('.tg-waveform-progress');

            const timeLabel = document.createElement('div');
            timeLabel.className = 'tg-time';
            timeLabel.innerText = '0:00';

            infoNode.appendChild(timeline);
            infoNode.appendChild(timeLabel);
            playerView.appendChild(playBtn);
            playerView.appendChild(infoNode);
            container.appendChild(playerView);

            timeline.addEventListener('click', (e) => {
                const rect = timeline.getBoundingClientRect();
                const clickPosition = (e.clientX - rect.left) / rect.width;
                if (!isNaN(audio.duration)) audio.currentTime = clickPosition * audio.duration;
            });

            playBtn.addEventListener('click', () => {
                document.querySelectorAll('audio').forEach(el => { if(el !== audio) el.pause(); });
                if (audio.paused) audio.play().catch(() => {}); else audio.pause();
            });

            audio.addEventListener('play', () => { playBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'; });
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    progressLine.style.width = pct + '%';
                    timeLabel.innerText = formatTime(audio.currentTime);
                }
            });
            audio.addEventListener('loadedmetadata', () => { timeLabel.innerText = formatTime(audio.duration); });

            function formatTime(secs) {
                if (isNaN(secs)) return "0:00";
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }

        function renderFileMessage(filename, filetype, dataUrl, side) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (filetype.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = dataUrl;
                box.appendChild(img);
            } else if (filetype.startsWith('audio/')) {
                initTelegramAudioPlayer(box, dataUrl);
            } else {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                link.className = 'file-link';
                link.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 18 15 15"></polyline></svg>
                    <span>${filename}</span>
                `;
                box.appendChild(link);
            }
            
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }
    </script>
