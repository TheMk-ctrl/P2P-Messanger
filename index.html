<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Workspace Pro</title>
    <!-- ПОДКЛЮЧЕНИЕ БИБЛИОТЕК -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            /* Минималистичная черно-белая палитра в стиле Vercel (Темная по умолчанию) */
            --bg-outer: #000000;
            --bg-card: #000000;
            --bg-input: #111111;
            --border: #333333;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #000000;
            --accent-hover: #cccccc;
            --accent-text: #ffffff;
            --bubble-in: #111111;
            --bubble-in-border: #333333;
            --bubble-out: #ffffff;
            --bubble-out-text: #000000;
            --badge-bg: #111111;
            --badge-text: #ffffff;
            --icon-color: #888888;
            
            --tg-voice-bg: #111111;
            --tg-voice-btn: #ffffff;
            --tg-voice-btn-icon: #000000;
            --tg-voice-seek: #333333;
            --tg-voice-progress: #ffffff;
            --reply-line: #ffffff;
            --tg-chat-active: #111111;
            --tg-avatar-bg: #000000;
        }

        /* Светлая тема */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-outer: #fafafa;
                --bg-card: #ffffff;
                --bg-input: #f1f3f4;
                --border: #e5e5e5;
                --text-main: #000000;
                --text-muted: #666666;
                --accent: #000000;
                --accent-hover: #333333;
                --accent-text: #ffffff;
                --bubble-in: #f1f3f4;
                --bubble-in-border: #e5e5e5;
                --bubble-out: #000000;
                --bubble-out-text: #ffffff;
                --badge-bg: #f1f3f4;
                --badge-text: #000000;
                --icon-color: #666666;
                
                --tg-voice-bg: #f1f3f4;
                --tg-voice-btn: #000000;
                --tg-voice-btn-icon: #ffffff;
                --tg-voice-seek: #e5e5e5;
                --tg-voice-progress: #000000;
                --reply-line: #000000;
                --tg-chat-active: #f1f3f4;
                --tg-avatar-bg: #ffffff;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-outer);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: 20px;
            color: var(--text-main);
        }

        .workspace {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            background-color: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
            background-color: var(--bg-card);
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header-status-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            height: 16px;
            margin-top: 2px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .status-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }
        .status-badge.connected::before {
            background-color: #2ec4b6;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-icon:hover {
            background-color: var(--bg-input);
            border-color: var(--text-main);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .p2p-panel {
            width: 300px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 100%;
            background-color: var(--bg-card);
            z-index: 30;
            transition: transform 0.2s ease, margin-left 0.2s ease;
            flex-shrink: 0;
        }

        .p2p-panel.collapsed {
            margin-left: -300px;
        }

        .panel-settings-block {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--bg-card);
        }

        .panel-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .p2p-panel button.action-btn {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .p2p-panel button.action-btn:hover {
            background-color: var(--bg-input);
            color: var(--text-main);
        }

        .p2p-panel button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .id-input-wrapper {
            display: flex;
            gap: 6px;
        }

        .id-input-wrapper input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-size: 0.8rem;
            transition: border-color 0.2s;
        }
        .id-input-wrapper input:focus {
            border-color: var(--text-muted);
        }

        .chats-section-title {
            padding: 16px 16px 6px 16px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chats-list-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .tg-chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .tg-chat-item:hover {
            background-color: var(--bg-input);
        }
        .tg-chat-item.active {
            background-color: var(--tg-chat-active);
        }

        .tg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background-color: var(--tg-avatar-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 0.9rem;
            flex-shrink: 0;
            text-transform: uppercase;
            border: 1px solid var(--border);
        }

        .tg-chat-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tg-chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tg-chat-name {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tg-chat-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tg-chat-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tg-chat-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .chat-delete-btn {
            background: transparent;
            border: none;
            color: #ff4d4f;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 4px;
        }
        .tg-chat-item:hover .chat-delete-btn {
            opacity: 1;
        }

        .panel-footer-block {
            padding: 16px;
            border-top: 1px solid var(--border);
            background-color: var(--bg-card);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .participant-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 110px;
            overflow-y: auto;
        }

        .participant-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background-color: var(--bg-input);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .participant-item .disconnect-btn {
            background: transparent;
            color: #ff4d4f;
            border: none;
            padding: 2px 4px;
            cursor: pointer;
        }

        .add-chat-modal {
            position: absolute;
            bottom: 60px;
            left: 16px;
            right: 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: menuFadeIn 0.15s ease;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            overflow: hidden;
            height: 100%;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            position: relative;
            margin-bottom: 6px;
        }
        .msg-wrapper.in { align-self: flex-start; align-items: flex-start; }
        .msg-wrapper.out { align-self: flex-end; align-items: flex-end; }

        .msg-sender-id {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 3px;
            padding: 0 4px;
            font-weight: 500;
        }

        .msg-box {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        .msg-wrapper.in .msg-box {
            background-color: var(--bubble-in);
            color: var(--text-main);
            border: 1px solid var(--bubble-in-border);
            border-top-left-radius: 4px;
        }
        .msg-wrapper.out .msg-box {
            background-color: var(--bubble-out);
            color: var(--bubble-out-text);
            border: 1px solid var(--bubble-out);
            border-top-right-radius: 4px;
        }

        .msg-box img, .msg-box video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .msg-box a {
            color: inherit;
            text-decoration: underline;
        }

        .msg-reactions-container {
            display: flex;
            gap: 4px;
            margin-top: -6px;
            z-index: 2;
            padding: 0 8px;
        }
        .msg-reaction-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .reply-quote {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.08);
            border-left: 2px solid var(--reply-line);
            padding: 4px 10px;
            margin-bottom: 6px;
            font-size: 0.8rem;
            text-align: left;
        }
        .msg-wrapper.out .reply-quote {
            background: rgba(0, 0, 0, 0.05);
            border-left: 2px solid var(--reply-line);
        }
        
        .reply-quote-sender {
            color: inherit;
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 2px;
        }

        .reply-quote-text {
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .active-reply-indicator {
            display: none;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            border-left: 2px solid var(--reply-line);
            padding: 8px 16px;
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        .active-reply-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .active-reply-title {
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.75rem;
        }

        .active-reply-text {
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .active-reply-close {
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .tg-voice-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(255,255,255,0.05);
            padding: 8px 14px;
            border-radius: 12px;
            min-width: 220px;
            margin-top: 4px;
        }
        .msg-wrapper.out .tg-voice-player {
            background-color: rgba(0,0,0,0.05);
        }

        .tg-play-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: var(--tg-voice-btn);
            color: var(--tg-voice-btn-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 0.8rem;
        }

        .tg-voice-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tg-timeline {
            position: relative;
            height: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .tg-waveform-bg {
            width: 100%;
            height: 2px;
            background-color: var(--tg-voice-seek);
            position: relative;
            overflow: hidden;
        }

        .tg-waveform-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--tg-voice-progress);
        }

        .tg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: inherit;
            text-decoration: none;
            font-weight: 500;
            margin-top: 4px;
        }

        .modes-bar {
            padding: 12px 20px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .modes-left {
            display: flex;
            gap: 8px;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border-radius: 20px;
            padding: 4px 12px;
            width: 180px;
            border: 1px solid var(--border);
        }

        .search-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.8rem;
            color: var(--text-main);
        }

        .pill-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pill-btn.active {
            background-color: #000000;
            color: #ffffff;
            border-color: var(--border);
        }
        @media (prefers-color-scheme: dark) {
            .pill-btn.active {
                background-color: #ffffff;
                color: #000000;
                border-color: #ffffff;
            }
        }

        .input-container {
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 4px 6px;
            gap: 8px;
            position: relative;
            width: 100%;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--text-muted);
        }

        .input-wrapper input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.9rem;
            height: 38px;
            min-width: 0;
            padding-left: 6px;
        }

        .input-icon {
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .input-icon:hover {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.05);
        }

        .input-icon.recording {
            color: #ff4d4f;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; } to { opacity: 0.4; }
        }

        .btn-send {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: transparent;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-send:hover {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.05);
        }

        .p2p-progress-toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: var(--bg-card);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: none;
            z-index: 500;
            font-weight: 500;
        }

        .msg-context-menu {
            position: fixed;
            z-index: 1000;
            width: 200px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
            animation: menuFadeIn 0.1s ease;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .reactions-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px 8px 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .reaction-item {
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .reaction-item:hover { transform: scale(1.15); }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            color: var(--text-main);
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .menu-item:hover { background-color: var(--bg-input); }
        .menu-item.danger { color: #ff4d4f; }

        .shared-media-container {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            align-content: start;
        }
        .media-thumb {
            aspect-ratio: 1;
            border-radius: 8px;
            background-color: var(--bg-input);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* ИНТЕРФЕЙС ЗВОНКОВ ПО МАКЕТУ ПОЛЬЗОВАТЕЛЯ */
        .call-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #a66fcc; /* Фиолетовый оттенок с референса */
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px 60px 20px;
            color: #ffffff;
            animation: fadeIn 0.2s ease;
            user-select: none;
        }
        
        .call-window-controls {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding-right: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 300;
        }

        .call-main-content {
            display: flex;
            flex-direction: column;

    <script>
        let peer = null;
        let connections = {}; 
        
        let myUserId = '';
        let chatHistory = [];
        let activeContextMenuTarget = null;
        let currentReplyTarget = null;
        let activeTab = 'dialog';

        let activeChatId = 'global_main'; 
        let rooms = [
            { id: 'global_main', name: 'Общий Стрим', type: 'group', participants: [] }
        ];
        let addChatType = 'user'; 

        let incomingFileBuffer = {};
        let incomingFileInfo = {};
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let derivedE2eeKey = null;
        const CRYPTO_SALT = CryptoJS.enc.Hex.parse("4d61785369646f726f765032504368617453616c74");

        let localStream = null;
        let currentCall = null;
        let activeCalls = {}; 
        let callState = 'idle'; 
        let currentCallType = 'audio'; 
        let remoteStreams = {}; 
        let statusTimers = {};
        let userStatuses = {}; 

        let currentIceServers = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' }
        ];

        marked.setOptions({ gfm: true, breaks: true, pure: true });

        window.addEventListener('DOMContentLoaded', () => {
            const savedRooms = localStorage.getItem('p2p_rooms');
            if (savedRooms) {
                try { rooms = JSON.parse(savedRooms); } catch(e){}
            }

            const savedHistory = localStorage.getItem('p2p_chat_history_v2');
            if (savedHistory) {
                try { chatHistory = JSON.parse(savedHistory); } catch (e) { console.error(e); }
            }

            myUserId = localStorage.getItem('p2p_my_id');
            if (!myUserId || myUserId.trim() === "") {
                myUserId = 'peer_' + Math.random().toString(36).substr(2, 6);
                localStorage.setItem('p2p_my_id', myUserId);
            }
            document.getElementById('myIdField').value = myUserId;

            const savedPass = sessionStorage.getItem('p2p_e2ee_pass');
            if (savedPass) {
                document.getElementById('e2eeKeyField').value = savedPass;
                deriveCryptoKeyFromInput();
            }

            initPeerJS();
            renderRoomsDOM();
            switchActiveChat(activeChatId);
        });

        async function deriveCryptoKeyFromInput() {
            const password = document.getElementById('e2eeKeyField').value;
            if (!password) { derivedE2eeKey = null; sessionStorage.removeItem('p2p_e2ee_pass'); return; }
            sessionStorage.setItem('p2p_e2ee_pass', password);
            const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
            const saltBytes = new Uint8Array(CRYPTO_SALT.words.length * 4);
            for (let i = 0; i < CRYPTO_SALT.words.length; i++) {
                const word = CRYPTO_SALT.words[i];
                saltBytes[i * 4] = (word >> 24) & 0xFF; saltBytes[i * 4 + 1] = (word >> 16) & 0xFF;
                saltBytes[i * 4 + 2] = (word >> 8) & 0xFF; saltBytes[i * 4 + 3] = word & 0xFF;
            }
            derivedE2eeKey = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encryptData(stringData) {
            if (!derivedE2eeKey) return { encrypted: false, payload: stringData };
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, derivedE2eeKey, new TextEncoder().encode(stringData));
            return {
                encrypted: true,
                iv: Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join(''),
                ciphertext: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
            };
        }

        async function decryptData(packet) {
            if (!packet.encrypted) return packet.payload;
            if (!derivedE2eeKey) return "🚨 [Сообщение зашифровано. Введите E2EE ключ]";
            try {
                const iv = new Uint8Array(packet.iv.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const encryptedBytes = new Uint8Array(atob(packet.ciphertext).split("").map(c => c.charCodeAt(0)));
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, derivedE2eeKey, encryptedBytes);
                return new TextDecoder().decode(decrypted);
            } catch (e) { return "🚨 [Неверный ключ шифрования]"; }
        }

        function initPeerJS() {
            setStatus('Подключение...');
            peer = new Peer(myUserId, { config: { iceServers: currentIceServers }, secure: true, debug: 0 });

            peer.on('open', (id) => {
                myUserId = id;
                localStorage.setItem('p2p_my_id', myUserId);
                updateStatusBadge();
                autoConnectToKnownPeers();
            });
            peer.on('connection', (conn) => { setupDataChannel(conn); });
            
            peer.on('call', (call) => {
                if (callState === 'active' && rooms.find(r => r.id === activeChatId)?.type === 'group') {
                    call.answer(localStream);
                    setupMediaCallHandlers(call);
                    activeCalls[call.peer] = call;
                    return;
                }
                
                if (callState !== 'idle') {
                    call.close();
                    return;
                }
                
                currentCall = call;
                showCallOverlay('ringing', call.peer);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    myUserId = 'peer_' + Math.random().toString(36).substr(2, 6);
                    document.getElementById('myIdField').value = myUserId;
                    initPeerJS(); 
                }
            });
            peer.on('disconnected', () => peer.reconnect());
        }

        function autoConnectToKnownPeers() {
            rooms.forEach(r => {
                if (r.type === 'user' && r.id !== 'global_main') {
                    connectToPeerById(r.id);
                }
                if (r.participants) {
                    r.participants.forEach(p => connectToPeerById(p));
                }
            });
        }

        function connectToPeerById(targetId) {
            if (!targetId || targetId === myUserId || connections[targetId]) return;
            if (peer && !peer.disconnected) {
                const conn = peer.connect(targetId, { reliable: true });
                setupDataChannel(conn);
            }
        }

        function setupDataChannel(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                if (!rooms.some(r => r.id === conn.peer)) {
                    rooms.push({ id: conn.peer, name: conn.peer, type: 'user', participants: [] });
                    localStorage.setItem('p2p_rooms', JSON.stringify(rooms));
                    renderRoomsDOM();
                }
                updateStatusBadge();
                updateParticipantListDOM();
            });

            conn.on('close', () => { delete connections[conn.peer]; updateStatusBadge(); updateParticipantListDOM(); });
            conn.on('error', () => { delete connections[conn.peer]; updateStatusBadge(); updateParticipantListDOM(); });

            conn.on('data', async (rawData) => {
                const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                
                if (data.type === 'status_update') {
                    handleIncomingStatus(conn.peer, data.roomId, data.status);
                    return;
                }
                if (data.type === 'call_system') {
                    handleCallSystemMessage(conn.peer, data);
                    return;
                }

                if (data.encryptedPayload) {
                    const decryptedString = await decryptData(data.encryptedPayload);
                    let decryptedPacket = JSON.parse(decryptedString);
                    const senderId = conn.peer;
                    
                    let targetRoom = decryptedPacket.roomId || senderId;
                    
                    if (targetRoom === myUserId) {
                        targetRoom = senderId;
                    }

                    if (!rooms.some(r => r.id === targetRoom)) {
                        targetRoom = 'global_main';
                    }

                    if (targetRoom !== 'global_main') {
                        const currentRoomObj = rooms.find(r => r.id === targetRoom);
                        if (currentRoomObj && currentRoomObj.type === 'user') {
                            if (targetRoom !== senderId) return; 
                        }
                    }

                    if (decryptedPacket.type === 'text') {
                        saveToStorage({ id: decryptedPacket.id, roomId: targetRoom, msgType: 'text', payload: decryptedPacket.payload, side: 'in', replyTo: decryptedPacket.replyTo, sender: senderId });
                    } else if (decryptedPacket.type === 'file-end') {
                        const fId = decryptedPacket.fileMsgId;
                        const fullPayload = incomingFileBuffer[fId].join('');
                        const info = incomingFileInfo[fId];
                        
                        if (info.filetype.startsWith('audio/')) {
                            saveToStorage({ id: fId, roomId: targetRoom, msgType: 'voice', payload: fullPayload, side: 'in', replyTo: info.replyTo, sender: senderId });
                        } else {
                            saveToStorage({ id: fId, roomId: targetRoom, msgType: 'file', filename: info.filename, filetype: info.filetype, payload: fullPayload, side: 'in', replyTo: info.replyTo, sender: senderId });
                        }
                        delete incomingFileBuffer[fId]; delete incomingFileInfo[fId];
                        document.getElementById('p2pProgress').style.display = 'none';
                    } else if (decryptedPacket.type === 'file-start') {
                        incomingFileBuffer[decryptedPacket.fileMsgId] = [];
                        incomingFileInfo[decryptedPacket.fileMsgId] = { filename: decryptedPacket.filename, filetype: decryptedPacket.filetype, replyTo: decryptedPacket.replyTo };
                        document.getElementById('p2pProgress').style.display = 'block';
                    } else if (decryptedPacket.type === 'file-chunk') {
                        if (incomingFileBuffer[decryptedPacket.fileMsgId]) incomingFileBuffer[decryptedPacket.fileMsgId].push(decryptedPacket.chunk);
                    } else if (decryptedPacket.type === 'reaction') {
                        updateReactionInStorage(decryptedPacket.msgId, decryptedPacket.emoji);
                    }

                    if (activeChatId === targetRoom) {
                        renderAllMessages(getFilteredHistory(activeChatId));
                    }
                    renderRoomsDOM();
                }
            });
        }

        function sendTypingStatus(forcedStatus = null) {
            let currentStatus = forcedStatus || 'typing';
            if (isRecording) currentStatus = 'recording_voice';
            if (callState === 'active') currentStatus = 'in_call';

            const room = rooms.find(r => r.id === activeChatId);
            let packet = { type: 'status_update', roomId: activeChatId, status: currentStatus };
            
            let targets = [];
            if (room && room.type === 'group') {
                targets = room.id === 'global_main' ? Object.keys(connections) : room.participants;
            } else {
                targets = [activeChatId];
            }

            targets.forEach(tId => {
                if (connections[tId] && connections[tId].open) {
                    connections[tId].send(packet);
                }
            });
        }

        function handleIncomingStatus(senderId, roomId, status) {
            if (!userStatuses[roomId]) userStatuses[roomId] = {};
            userStatuses[roomId][senderId] = { status: status, timestamp: Date.now() };

            if (statusTimers[senderId]) clearTimeout(statusTimers[senderId]);
            statusTimers[senderId] = setTimeout(() => {
                if (userStatuses[roomId] && userStatuses[roomId][senderId]) {
                    delete userStatuses[roomId][senderId];
                    updateHeaderStatusTextDOM();
                }
            }, 4000);

            if (roomId === activeChatId) {
                updateHeaderStatusTextDOM();
            }
        }

        function updateHeaderStatusTextDOM() {
            const statusIndicator = document.getElementById('headerStatusText');
            const roomData = rooms.find(r => r.id === activeChatId);
            if (!roomData) return;

            const currentRoomStatuses = userStatuses[activeChatId] || {};
            const activeStrings = [];

            for (const [pId, info] of Object.entries(currentRoomStatuses)) {
                let textRepresentation = 'активен';
                if (info.status === 'typing') textRepresentation = 'печатает...';
                if (info.status === 'recording_voice') textRepresentation = 'записывает голосовое...';
                if (info.status === 'in_call') textRepresentation = 'в звонке';
                
                if (roomData.type === 'group') {
                    activeStrings.push(`${pId} ${textRepresentation}`);
                } else {
                    activeStrings.push(textRepresentation);
                }
            }

            if (activeStrings.length > 0) {
                statusIndicator.innerText = activeStrings.join(', ');
            } else {
                statusIndicator.innerText = roomData.type === 'group' ? 'групповой чат' : 'личная переписка';
            }
        }

        function showCallOverlay(state, targetId) {
            callState = state;
            const overlay = document.getElementById('callOverlay');
            const callNameDOM = document.getElementById('callNameDOM');
            const callStatusDOM = document.getElementById('callStatusDOM');
            const avatarDOM = document.getElementById('callAvatarDOM');
            const acceptContainer = document.getElementById('acceptCallContainer');

            overlay.style.display = 'flex';
            avatarDOM.innerHTML = targetId.charAt(0).toUpperCase();
            callNameDOM.innerText = targetId;

            if (state === 'calling') {
                callStatusDOM.innerText = 'ожидание...';
                acceptContainer.style.display = 'none';
            } else if (state === 'ringing') {
                callStatusDOM.innerText = 'входящий звонок...';
                acceptContainer.style.display = 'flex';
            } else if (state === 'active') {
                callStatusDOM.innerText = 'разговор...';
                acceptContainer.style.display = 'none';
                sendTypingStatus('in_call');
            }
        }

        async function initiateCall(type) {
            if (callState !== 'idle') return;
            const room = rooms.find(r => r.id === activeChatId);
            if (!room) return;
            currentCallType = type;

            try {
                const constraints = { audio: true, video: type === 'video' };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                displayLocalStream();

                if (room.type === 'user') {
                    showCallOverlay('calling', room.id);
                    const call = peer.call(room.id, localStream);
                    currentCall = call;
                    setupMediaCallHandlers(call);
                } else {
                    showCallOverlay('active', room.name);
                    let targets = room.id === 'global_main' ? Object.keys(connections) : room.participants;
                    targets.forEach(tId => {
                        if (connections[tId] && connections[tId].open) {
                            connections[tId].send({ type: 'call_system', action: 'group_call_started', roomId: room.id });
                            const call = peer.call(tId, localStream);
                            activeCalls[tId] = call;
                            setupMediaCallHandlers(call);
                        }
                    });
                }
            } catch (err) {
                alert('Не удалось получить доступ к медиаустройствам: ' + err);
                hangUpCall();
            }
        }

        function handleCallSystemMessage(senderId, data) {
            if (data.action === 'group_call_started') {
                if (callState === 'idle' && activeChatId === data.roomId) {
                    showCallOverlay('ringing', rooms.find(r => r.id === data.roomId)?.name || 'Группа');
                }
            }
        }

        async function acceptIncomingCall() {
            if (!currentCall && rooms.find(r => r.id === activeChatId)?.type !== 'group') return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                displayLocalStream();

                if (currentCall) {
                    currentCall.answer(localStream);
                    setupMediaCallHandlers(currentCall);
                    showCallOverlay('active', currentCall.peer);
                } else {
                    const room = rooms.find(r => r.id === activeChatId);
                    showCallOverlay('active', room.name);
                    let targets = room.id === 'global_main' ? Object.keys(connections) : room.participants;
                    targets.forEach(tId => {
                        if (connections[tId] && connections[tId].open) {
                            const call = peer.call(tId, localStream);
                            activeCalls[tId] = call;
                            setupMediaCallHandlers(call);
                        }
                    });
                }
            } catch (err) {
                alert('Ошибка доступа к медиаустройствам: ' + err);
                hangUpCall();
            }
        }

        function setupMediaCallHandlers(call) {
            call.on('stream', (remoteStream) => {
                remoteStreams[call.peer] = remoteStream;
                displayRemoteStream(remoteStream, call.peer);
            });
            call.on('close', () => { handleMediaCallDisconnect(call.peer); });
            call.on('error', () => { handleMediaCallDisconnect(call.peer); });
        }

        function handleMediaCallDisconnect(peerId) {
            delete remoteStreams[peerId];
            delete activeCalls[peerId];
            
            const room = rooms.find(r => r.id === activeChatId);
            if (!(room && room.type === 'group' && callState === 'active')) {
                if (currentCall && currentCall.peer === peerId) {
                    hangUpCall();
                }
            }
        }

        function displayLocalStream() {
            const avatarDOM = document.getElementById('callAvatarDOM');
            avatarDOM.innerHTML = '';
            
            const videoTracks = localStream.getVideoTracks();
            if (videoTracks.length > 0 && videoTracks[0].enabled) {
                const video = document.createElement('video');
                video.srcObject = localStream;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;
                avatarDOM.appendChild(video);
            } else {
                avatarDOM.innerHTML = myUserId.charAt(0).toUpperCase();
            }
        }

        function displayRemoteStream(stream, peerId) {
            const room = rooms.find(r => r.id === activeChatId);
            if (room && room.type === 'user') {
                const avatarDOM = document.getElementById('callAvatarDOM');
                avatarDOM.innerHTML = '';
                const videoTracks = stream.getVideoTracks();
                if (videoTracks.length > 0) {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.autoplay = true;
                    video.playsInline = true;
                    avatarDOM.appendChild(video);
                } else {
                    avatarDOM.innerHTML = peerId.charAt(0).toUpperCase();
                }
            }
        }

        function toggleCallVideo() {
            if (localStream) {
                let videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('callVideoBtn').style.opacity = videoTrack.enabled ? '1' : '0.6';
                    displayLocalStream();
                } else {
                    navigator.mediaDevices.getUserMedia({ video: true }).then(vStream => {
                        const newTrack = vStream.getVideoTracks()[0];
                        localStream.addTrack(newTrack);
                        document.getElementById('callVideoBtn').style.opacity = '1';
                        displayLocalStream();
                        Object.values(activeCalls).forEach(c => {
                            if(c.peerConnection) {
                                const sender = c.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                                if (sender) sender.replaceTrack(newTrack);
                            }
                        });
                        if (currentCall && currentCall.peerConnection) {
                            const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                            if (sender) sender.replaceTrack(newTrack);
                        }
                    }).catch(() => alert('Камера недоступна.'));
                }
            }
        }

        function hangUpCall() {
            if (currentCall) currentCall.close();
            Object.values(activeCalls).forEach(c => c.close());
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            localStream = null;
            currentCall = null;
            activeCalls = {};
            remoteStreams = {};
            callState = 'idle';
            document.getElementById('callOverlay').style.display = 'none';
            document.getElementById('callVideoBtn').style.opacity = '1';
            sendTypingStatus('active');
        }

        function renderRoomsDOM() {
            const container = document.getElementById('chatsListDOM');
            container.innerHTML = '';

            rooms.forEach(room => {
                const isSelected = room.id === activeChatId;
                const history = getFilteredHistory(room.id);
                const lastMsg = history[history.length - 1];
                
                let previewText = 'Нет сообщений';
                let metaTime = '';
                if(lastMsg) {
                    if(lastMsg.msgType === 'text') previewText = lastMsg.payload;
                    else if(lastMsg.msgType === 'voice') previewText = '🎵 Голосовое сообщение';
                    else previewText = `📁 ${lastMsg.filename || 'Файл'}`;
                    metaTime = new Date(parseInt(lastMsg.id.split('_')[1]) || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                const firstLetter = room.name.charAt(0);

                const item = document.createElement('div');
                item.className = `tg-chat-item ${isSelected ? 'active' : ''}`;
                item.onclick = () => switchActiveChat(room.id);
                item.innerHTML = `
                    <div class="tg-avatar">${firstLetter}</div>
                    <div class="tg-chat-info">
                        <div class="tg-chat-top">
                            <div class="tg-chat-name">${room.name}</div>
                            <div class="tg-chat-meta">${metaTime}</div>
                        </div>
                        <div class="tg-chat-bottom">
                            <div class="tg-chat-preview">${previewText}</div>
                            ${room.id !== 'global_main' ? `<button class="chat-delete-btn" onclick="deleteChatRoom(event, '${room.id}')">✕</button>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function deleteChatRoom(event, id) {
            event.stopPropagation();
            if (confirm(`Вы действительно хотите удалить чат и всю его историю?`)) {
                rooms = rooms.filter(r => r.id !== id);
                chatHistory = chatHistory.filter(m => m.roomId !== id);
                localStorage.setItem('p2p_rooms', JSON.stringify(rooms));
                localStorage.setItem('p2p_chat_history_v2', JSON.stringify(chatHistory));

        function switchActiveChat(id) {

            document.getElementById('chatTitle').innerText = `${currentRoom.name} (Вы: ${myUserId})`;

        }

        function setAddChatType(type) {
            addChatType = type;
            document.getElementById('typeUserBtn').classList.toggle('active', type === 'user');
            document.getElementById('typeGroupBtn').classList.toggle('active', type === 'group');

        }

        function confirmAddChat() {
            const val = document.getElementById('chatTargetInput').value.trim();
            if(!val) return;

            if (addChatType === 'user') {
                if(!rooms.some(r => r.id === val)) {
                    rooms.push({ id: val, name: val, type: 'user', participants: [] });
                    connectToPeerById(val);

                switchActiveChat(val);
            } else {

                switchActiveChat(gId);

            if(pId && room && !room.participants.includes(pId)) {

                localStorage.setItem('p2p_rooms', JSON.stringify(rooms));
                connectToPeerById(pId);

            const room = rooms.find(r => r.id === activeChatId);

                room.participants = room.participants.filter(p => p !== pId);
                localStorage.setItem('p2p_rooms', JSON.stringify(rooms));

        function updateMyId() {
            const newId = document.getElementById('myIdField').value.trim();
            if (newId && newId !== myUserId) {
                myUserId = newId; localStorage.setItem('p2p_my_id', myUserId);
                if (peer) peer.destroy();

            }

            statusEl.innerText = text; statusEl.className = 'status-badge'; 
            if (state === 'connected') statusEl.classList.add('connected');

        function updateStatusBadge() {
            const count = Object.keys(connections).length;
            setStatus(count > 0 ? `Сеть: ${count + 1}` : 'В сети (один)', count > 0 ? 'connected' : 'default');
        }

        function togglePanel() {
            const panel = document.getElementById('p2pPanel');
            if (window.innerWidth <= 768) panel.classList.toggle('open');
            else panel.classList.toggle('collapsed');
        }

        async function broadcastPacket(packet) {
            packet.roomId = activeChatId; 
            const stringified = JSON.stringify(packet);
            const cryptoContainer = await encryptData(stringified);
            
            const currentRoom = rooms.find(r => r.id === activeChatId);
            let targets = [];

            if (currentRoom && currentRoom.type === 'group') {
                if(currentRoom.id === 'global_main') {
                    targets = Object.keys(connections);
                } else {
                    targets = currentRoom.participants;
                }
            } else {
                targets = [activeChatId];
            }

            targets.forEach(tId => {
                if (connections[tId] && connections[tId].open) {
                    connections[tId].send({ encryptedPayload: cryptoContainer });
                }
            });
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const packet = { type: 'text', payload: text, id: mId, replyTo: currentReplyTarget };
            
            await broadcastPacket(packet);
            
            const savedObj = { id: mId, roomId: activeChatId, msgType: 'text', payload: text, side: 'out', replyTo: currentReplyTarget, reactions: [], sender: myUserId };
            saveToStorage(savedObj);
            
            renderTextMessage(text, 'out', mId, currentReplyTarget, [], myUserId);
            renderRoomsDOM();
            input.value = ''; cancelReply();
        }

        async function sendMediaDataInChunks(base64Data, filename, mimeType) {
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const progressIndicator = document.getElementById('p2pProgress');
            progressIndicator.style.display = 'block';

            sendTypingStatus('recording_voice');
            await broadcastPacket({ type: 'file-start', filename: filename, filetype: mimeType, replyTo: currentReplyTarget, fileMsgId: mId });

            const CHUNK_SIZE = 12000; let offset = 0;
            while (offset < base64Data.length) {
                const chunk = base64Data.slice(offset, offset + CHUNK_SIZE); offset += CHUNK_SIZE;
                const pct = Math.min(100, Math.floor((offset / base64Data.length) * 100));
                progressIndicator.innerText = `Отправка: ${pct}%`;
                await broadcastPacket({ type: 'file-chunk', chunk: chunk, fileMsgId: mId });
            }

            progressIndicator.style.display = 'none';
            await broadcastPacket({ type: 'file-end', fileMsgId: mId });
            
            let savedObj = { id: mId, roomId: activeChatId, payload: base64Data, side: 'out', replyTo: currentReplyTarget, reactions: [], sender: myUserId };
            if (mimeType.startsWith('audio/')) {
                savedObj.msgType = 'voice'; renderVoiceMessage(base64Data, 'out', mId, currentReplyTarget, [], myUserId);
            } else {
                savedObj.msgType = 'file'; savedObj.filename = filename; savedObj.filetype = mimeType;
                renderFileMessage(filename, mimeType, base64Data, 'out', mId, currentReplyTarget, [], myUserId);
            }
            saveToStorage(savedObj);
            renderRoomsDOM(); cancelReply();
        }

        function processFileSelection(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const bytes = new Uint8Array(e.target.result); let binary = '';
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                sendMediaDataInChunks(`data:${file.type || "application/octet-stream"};base64,` + btoa(binary), file.name, file.type);
            };
            reader.readAsArrayBuffer(file); input.value = '';
        }

        async function toggleVoiceRecord() {
            const micBtn = document.getElementById('micBtn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = []; mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const reader = new FileReader();
                        reader.onloadend = () => sendMediaDataInChunks(reader.result, 'voice.webm', 'audio/webm');
                        reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                    };
                    mediaRecorder.start(); isRecording = true; micBtn.classList.add('recording');
                    sendTypingStatus('recording_voice');
                } catch (err) { alert('Микрофон недоступен.'); }
            } else { if (mediaRecorder) mediaRecorder.stop(); isRecording = false; micBtn.classList.remove('recording'); sendTypingStatus('typing'); }
        }

        function parseMarkdownAndLinks(text) {
            let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return marked.parseInline(safeText.replace(/(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, '<a href="$1" target="_blank">$1</a>'));
        }

        function appendReactionsContainer(wrapper, reactions) {
            let container = wrapper.querySelector('.msg-reactions-container');
            if (!container) { container = document.createElement('div'); container.className = 'msg-reactions-container'; wrapper.appendChild(container); }
            container.innerHTML = '';
            if (reactions && reactions.length > 0) {
                const counts = {}; reactions.forEach(r => counts[r] = (counts[r] || 0) + 1);
                for (const [emoji, count] of Object.entries(counts)) {
                    const badge = document.createElement('div'); badge.className = 'msg-reaction-badge';
                    badge.innerText = count > 1 ? `${emoji} ${count}` : emoji; container.appendChild(badge);
                }
            } else container.remove();
        }

        function renderTextMessage(text, side, id, replyTo = null, reactions = [], senderId = '') {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${side}`; wrapper.setAttribute('data-msg-id', id);
            
            if(senderId && side === 'in') {
                const senderDiv = document.createElement('div'); senderDiv.className = 'msg-sender-id'; senderDiv.innerText = senderId; wrapper.appendChild(senderDiv);
            }
            const box = document.createElement('div'); box.className = 'msg-box';
            if (replyTo) {
                box.innerHTML = `<div class="reply-quote"><div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : replyTo.senderId || 'Пир'}</div><div class="reply-quote-text">${replyTo.text}</div></div>`;
            }
            const txt = document.createElement('span'); txt.innerHTML = parseMarkdownAndLinks(text); box.appendChild(txt);
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, text, side, senderId); });
            wrapper.appendChild(box); appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper); container.scrollTop = container.scrollHeight;
        }

        function renderFileMessage(filename, filetype, dataUrl, side, id, replyTo = null, reactions = [], senderId = '') {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${side}`; wrapper.setAttribute('data-msg-id', id);
            
            if(senderId && side === 'in') {
                const s = document.createElement('div'); s.className = 'msg-sender-id'; s.innerText = senderId; wrapper.appendChild(s);
            }
            const box = document.createElement('div'); box.className = 'msg-box';
            if (filetype.startsWith('image/')) {
                box.innerHTML = `<img src="${dataUrl}">`;
            } else if (filetype.startsWith('video/')) {
                box.innerHTML = `<video src="${dataUrl}" controls></video>`;
            } else {
                box.innerHTML = `<a href="${dataUrl}" download="${filename}" class="file-link">📁 ${filename}</a>`;
            }
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, filename, side, senderId); });
            wrapper.appendChild(box); appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper); container.scrollTop = container.scrollHeight;
        }

        function renderVoiceMessage(dataUrl, side, id, replyTo = null, reactions = [], senderId = '') {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${side}`; wrapper.setAttribute('data-msg-id', id);
            if(senderId && side === 'in') {
                const s = document.createElement('div'); s.className = 'msg-sender-id'; s.innerText = senderId; wrapper.appendChild(s);
            }
            const box = document.createElement('div'); box.className = 'msg-box';
            const audio = new Audio(dataUrl);
            box.innerHTML = `<div class="tg-voice-player"><button class="tg-play-btn">▶</button><div class="tg-voice-info"><div class="tg-timeline"><div class="tg-waveform-bg"><div class="tg-waveform-progress"></div></div></div><span class="tg-time">0:00</span></div></div>`;
            
            const btn = box.querySelector('.tg-play-btn'); const prg = box.querySelector('.tg-waveform-progress'); const tm = box.querySelector('.tg-time');
            audio.addEventListener('timeupdate', () => { prg.style.width = `${(audio.currentTime / audio.duration) * 100}%`; tm.innerText = `${Math.floor(audio.currentTime/60)}:${Math.floor(audio.currentTime%60).toString().padStart(2,'0')}`; });
            btn.addEventListener('click', (e) => { e.stopPropagation(); if(audio.paused){ audio.play(); btn.innerText='⏸';}else{audio.pause(); btn.innerText='▶';} });
            
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, 'Голосовое', side, senderId); });
            wrapper.appendChild(box); appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper); container.scrollTop = container.scrollHeight;
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabDialogBtn').classList.toggle('active', tab === 'dialog');
            document.getElementById('tabMediaBtn').classList.toggle('active', tab === 'media');
            document.getElementById('messages').style.display = tab === 'dialog' ? 'flex' : 'none';
            document.getElementById('sharedMedia').style.display = tab === 'media' ? 'grid' : 'none';
            if (tab === 'media') {
                const grid = document.getElementById('sharedMedia'); grid.innerHTML = '';
                getFilteredHistory(activeChatId).forEach(msg => {
                    if(msg.msgType === 'file' || msg.msgType === 'voice') {
                        const d = document.createElement('div'); d.className = 'media-thumb'; d.innerText = msg.msgType==='voice'?'🎵':'📄';
                        grid.appendChild(d);
                    }
                });
            }
        }

        function handleLocalSearch() {
            const q = document.getElementById('localSearchInput').value.toLowerCase().trim();
            const container = document.getElementById('messages'); container.innerHTML = '';
            getFilteredHistory(activeChatId).forEach(msg => {
                if(!q || (msg.payload && msg.payload.toLowerCase().includes(q))) {
                    if (msg.msgType === 'text') renderTextMessage(msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions, msg.sender);
                }
            });
        }

        function renderAllMessages(historyArray) {
            const container = document.getElementById('messages'); container.innerHTML = '';
            historyArray.forEach(msg => {
                if (msg.msgType === 'text') renderTextMessage(msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions, msg.sender);
                else if (msg.msgType === 'file') renderFileMessage(msg.filename, msg.filetype, msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions, msg.sender);
                else if (msg.msgType === 'voice') renderVoiceMessage(msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions, msg.sender);
            });
        }

        function openContextMenu(e, msgId, textContent, side, senderId) {
            const menu = document.getElementById('msgContextMenu');
            activeContextMenuTarget = { id: msgId, text: textContent, sender: side, senderId: senderId };
            menu.style.display = 'flex'; menu.style.top = `${Math.min(e.clientY, window.innerHeight - 150)}px`; menu.style.left = `${Math.min(e.clientX, window.innerWidth - 230)}px`;
        }

        document.addEventListener('click', () => { document.getElementById('msgContextMenu').style.display = 'none'; });

        async function triggerReaction(emoji) {
            if (!activeContextMenuTarget) return;
            const tId = activeContextMenuTarget.id;
            updateReactionInStorage(tId, emoji);
            await broadcastPacket({ type: 'reaction', msgId: tId, emoji: emoji });
            renderAllMessages(getFilteredHistory(activeChatId));
        }

        function updateReactionInStorage(msgId, emoji) {
            const idx = chatHistory.findIndex(m => m.id === msgId);
            if (idx !== -1) {
                if (!chatHistory[idx].reactions) chatHistory[idx].reactions = [];
                const rIdx = chatHistory[idx].reactions.indexOf(emoji);
                if (rIdx > -1) chatHistory[idx].reactions.splice(rIdx, 1); else chatHistory[idx].reactions.push(emoji);
                localStorage.setItem('p2p_chat_history_v2', JSON.stringify(chatHistory));
            }
        }

        function contextCopy() { if (activeContextMenuTarget) navigator.clipboard.writeText(activeContextMenuTarget.text); }
        function contextDelete() {
            if (!activeContextMenuTarget) return;
            chatHistory = chatHistory.filter(m => m.id !== activeContextMenuTarget.id);
            localStorage.setItem('p2p_chat_history_v2', JSON.stringify(chatHistory));
            renderAllMessages(getFilteredHistory(activeChatId)); renderRoomsDOM();
        }

        function contextReply() {
            if (!activeContextMenuTarget) return;
            currentReplyTarget = { id: activeContextMenuTarget.id, text: activeContextMenuTarget.text, sender: activeContextMenuTarget.sender, senderId: activeContextMenuTarget.senderId };
            document.getElementById('activeReplyIndicator').style.display = 'flex';
            document.getElementById('activeReplyText').innerText = activeContextMenuTarget.text;
        }

        function cancelReply() { currentReplyTarget = null; document.getElementById('activeReplyIndicator').style.display = 'none'; }
        function saveToStorage(obj) { chatHistory.push(obj); localStorage.setItem('p2p_chat_history_v2', JSON.stringify(chatHistory)); }
        
        function clearHistory() {
            if (confirm("Удалить всю историю текущего чата?")) {
                chatHistory = chatHistory.filter(m => m.roomId !== activeChatId);
                localStorage.setItem('p2p_chat_history_v2', JSON.stringify(chatHistory));
                renderAllMessages([]); renderRoomsDOM();
            }
        }
    </script>
</body>
</html>
