<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Workspace Chat</title>
    <style>
        :root {
            --bg-outer: #f4f5f6;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --border: #f0f0f2;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --accent: #000000;
            --accent-text: #ffffff;
            --bubble-in: #ffffff;
            --bubble-in-border: #e1e4e8;
            --bubble-out: #f0f2f5;
            --badge-bg: #fff8ec;
            --badge-text: #b07d1a;
            --icon-color: #636c76;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-outer: #0a0b0d;
                --bg-card: #16181c;
                --bg-input: #22262c;
                --border: #2d3139;
                --text-main: #e6edf3;
                --text-muted: #8b949e;
                --accent: #ffffff;
                --accent-text: #16181c;
                --bubble-in: #1f242c;
                --bubble-in-border: #2d3139;
                --bubble-out: #282e38;
                --badge-bg: #2c2214;
                --badge-text: #e3b341;
                --icon-color: #8b949e;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-outer);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .workspace {
            width: 100%;
            max-width: 960px;
            height: 100%;
            max-height: 900px;
            background-color: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 5;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .status-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--badge-text);
            border-radius: 50%;
        }
        .status-badge.connected {
            background-color: rgba(35, 165, 90, 0.1);
            color: #23a55a;
        }
        .status-badge.connected::before {
            background-color: #23a55a;
        }
        .status-badge.typing {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .status-badge.typing::before {
            background-color: var(--text-muted);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.3; } to { opacity: 1; }
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .p2p-panel {
            width: 280px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            background-color: var(--bg-card);
            z-index: 15;
            transition: margin-left 0.3s ease, transform 0.3s ease;
        }

        .p2p-panel.collapsed {
            margin-left: -280px;
        }

        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .p2p-panel button {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 70px;
            background-color: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 0.8rem;
            resize: none;
            outline: none;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }
        .msg-wrapper.in { align-self: flex-start; }
        .msg-wrapper.out { align-self: flex-end; }

        .msg-box {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }
        .msg-wrapper.in .msg-box {
            background-color: var(--bubble-in);
            color: var(--text-main);
            border: 1px solid var(--bubble-in-border);
            border-top-left-radius: 4px;
        }
        .msg-wrapper.out .msg-box {
            background-color: var(--bubble-out);
            color: var(--text-main);
            border-top-right-radius: 4px;
        }

        .msg-box img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .msg-box audio {
            max-width: 100%;
            display: block;
            margin-top: 6px;
            outline: none;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            margin-top: 4px;
        }

        .modes-bar {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .modes-left {
            display: flex;
            gap: 8px;
        }

        .pill-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }
        .pill-btn.active {
            background-color: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }
        .pill-btn.danger {
            border-color: rgba(255, 0, 0, 0.2);
            color: #ff4d4f;
        }
        .pill-btn.danger:hover {
            background-color: rgba(255, 0, 0, 0.05);
        }

        .input-container {
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 16px;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.95rem;
            height: 40px;
        }

        .input-icon {
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--border);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .btn-send.active {
            background-color: var(--accent);
            color: var(--accent-text);
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .workspace {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
                border: none;
            }
            .p2p-panel { 
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                max-width: 290px;
                box-shadow: 10px 0 20px rgba(0,0,0,0.15);
                transform: translateX(-100%);
                margin-left: 0 !important;
            }
            .p2p-panel.open {
                transform: translateX(0);
            }
            .input-container {
                padding: 10px 14px 14px 14px;
            }
            .messages-container {
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="header">
            <div class="header-title">P2P Workspace Pro</div>
            <div class="header-controls">
                <div id="status" class="status-badge">Ожидание p2p</div>
                <button class="btn-icon" onclick="togglePanel()" title="Настройки подключения">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1  1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="p2p-panel" id="p2pPanel">
                <div class="panel-title">Шаг 1: Создание</div>
                <button onclick="createOffer()">Создать комнату</button>
                <div class="panel-title">Ваш токен связи:</div>
                <textarea id="localKey" readonly placeholder="Здесь появится сгенерированный токен"></textarea>
                <div class="panel-title">Шаг 2: Подключение</div>
                <textarea id="remoteKey" placeholder="Вставьте токен собеседника сюда"></textarea>
                <button onclick="acceptRemoteKey()">Подключить токен</button>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messages">
                    <!-- Сообщения будут рендериться динамически из скрипта -->
                </div>

                <div class="modes-bar">
                    <div class="modes-left">
                        <button class="pill-btn active">💬 Диалог</button>
                        <button class="pill-btn" onclick="alert('Все данные передаются в зашифрованных P2P-каналах памяти браузера.')">🔒 Безопасность</button>
                    </div>
                    <button class="pill-btn danger" onclick="clearHistory()" title="Очистить историю на этом устройстве">🗑 Очистить чат</button>
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <input type="file" id="fileField" style="display:none" onchange="handleFileSelect(this)">
                        
                        <div class="input-icon" onclick="document.getElementById('fileField').click()" title="Выбрать документ, фото или аудио">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </div>
                        
                        <input type="text" id="msgInput" placeholder="Введите текст сообщения..." oninput="sendTypingSignal()" onkeydown="if(event.key === 'Enter') sendMessage()" disabled>
                        
                        <button id="btnSend" class="btn-send" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peerConnection;
        let dataChannel;
        let typingTimeout;
        let isConnectedState = false;
        
        // Массив для хранения истории сообщений текущей вкладки
        let chatHistory = [];

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Загрузка истории при старте страницы
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('p2p_chat_history');
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(msg => {
                        if (msg.msgType === 'text') {
                            renderTextMessage(msg.payload, msg.side);
                        } else if (msg.msgType === 'file') {
                            renderFileMessage(msg.filename, msg.filetype, msg.payload, msg.side);
                        }
                    });
                } catch (e) {
                    console.error("Ошибка чтения истории из LocalStorage:", e);
                }
            } else {
                // Если истории нет, выводим приветственное сообщение по умолчанию
                renderTextMessage("Привет! Это приватный P2P-мессенджер без серверов. Сгенерируй токен слева или вставь токен друга для начала сессии. История сообщений теперь сохраняется локально на твоем устройстве!", 'in');
            }
        });

        function saveToStorage(messageObject) {
            chatHistory.push(messageObject);
            // Лимит на размер хранилища (чтобы тяжелые Base64 файлы не переполнили 5МБ лимит localStorage)
            // При желании тяжелые файлы можно исключать из сохранения, проверяя messageObject.payload.length
            try {
                localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory));
            } catch(e) {
                console.warn("LocalStorage переполнен, старые сообщения удалены.");
                chatHistory.shift();
                localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory));
            }
        }

        function clearHistory() {
            if (confirm("Вы уверены, что хотите полностью стереть историю чата на этом устройстве?")) {
                localStorage.removeItem('p2p_chat_history');
                chatHistory = [];
                document.getElementById('messages').innerHTML = '';
                renderTextMessage("История очищена.", 'in');
            }
        }

        function setStatus(text, state = 'default') {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.className = 'status-badge'; 
            if (state === 'connected') statusEl.classList.add('connected');
            if (state === 'typing') statusEl.classList.add('typing');
        }

        function togglePanel() {
            const panel = document.getElementById('p2pPanel');
            if (window.innerWidth <= 680) {
                panel.classList.toggle('open');
            } else {
                panel.classList.toggle('collapsed');
            }
        }

        function generateLocalToken() {
            if (!peerConnection || !peerConnection.localDescription) return;
            const sdpData = {
                type: peerConnection.localDescription.type,
                sdp: peerConnection.localDescription.sdp
            };
            document.getElementById('localKey').value = btoa(JSON.stringify(sdpData));
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            
            dataChannel.onopen = () => {
                isConnectedState = true;
                setStatus('В сети', 'connected');
                document.getElementById('msgInput').disabled = false;
                const sendBtn = document.getElementById('btnSend');
                sendBtn.disabled = false;
                sendBtn.classList.add('active');
                document.getElementById('p2pPanel').classList.remove('open');
            };
            
            dataChannel.onclose = () => {
                isConnectedState = false;
                setStatus('Разъединено');
                document.getElementById('msgInput').disabled = true;
                document.getElementById('btnSend').classList.remove('active');
            };
            
            dataChannel.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    
                    if (data.type === 'typing') {
                        if (data.isTyping) {
                            setStatus('Печатает...', 'typing');
                        } else {
                            setStatus('В сети', 'connected');
                        }
                    } else if (data.type === 'text') {
                        renderTextMessage(data.payload, 'in');
                        saveToStorage({ msgType: 'text', payload: data.payload, side: 'in' });
                    } else if (data.type === 'file') {
                        renderFileMessage(data.filename, data.filetype, data.payload, 'in');
                        saveToStorage({ msgType: 'file', filename: data.filename, filetype: data.filetype, payload: data.payload, side: 'in' });
                    }
                } catch(err) {
                    renderTextMessage(e.data, 'in');
                    saveToStorage({ msgType: 'text', payload: e.data, side: 'in' });
                }
            };
        }

        function bindPeerEvents(pc) {
            pc.onicecandidate = (e) => {
                generateLocalToken();
                if (!e.candidate) {
                    setStatus(pc.localDescription.type === 'offer' ? 'Токен создан' : 'Ответ готов');
                }
            };

            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'checking') setStatus('Соединение...');
                if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                    setStatus('В сети', 'connected');
                }
                if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') setStatus('Разъединено');
            };
        }

        async function createOffer() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            setupDataChannel(peerConnection.createDataChannel("chat"));
            bindPeerEvents(peerConnection);

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            generateLocalToken();
        }

        async function acceptRemoteKey() {
            const rawKey = document.getElementById('remoteKey').value.trim();
            if (!rawKey) return alert('Пожалуйста, вставьте токен!');
            
            try {
                const remoteDesc = JSON.parse(atob(rawKey));
                
                if (!peerConnection) {
                    peerConnection = new RTCPeerConnection(rtcConfig);
                    peerConnection.ondatachannel = (e) => setupDataChannel(e.channel);
                    bindPeerEvents(peerConnection);

                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    generateLocalToken();
                } else {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                }
            } catch (err) {
                alert('Ошибка разбора токена.');
            }
        }

        function sendTypingSignal() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            
            dataChannel.send(JSON.stringify({ type: 'typing', isTyping: true }));
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                dataChannel.send(JSON.stringify({ type: 'typing', isTyping: false }));
            }, 1500);
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
            
            const packet = { type: 'text', payload: text };
            dataChannel.send(JSON.stringify(packet));
            
            renderTextMessage(text, 'out');
            saveToStorage({ msgType: 'text', payload: text, side: 'out' });
            
            input.value = '';
            dataChannel.send(JSON.stringify({ type: 'typing', isTyping: false }));
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file || !dataChannel || dataChannel.readyState !== 'open') return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const packet = {
                    type: 'file',
                    filename: file.name,
                    filetype: file.type,
                    payload: e.target.result
                };
                
                dataChannel.send(JSON.stringify(packet));
                renderFileMessage(file.name, file.type, e.target.result, 'out');
                saveToStorage({ msgType: 'file', filename: file.name, filetype: file.type, payload: e.target.result, side: 'out' });
                input.value = '';
            };
            reader.readAsDataURL(file);
        }

        // Рендер текстовых блоков в DOM
        function renderTextMessage(text, side) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            
            const box = document.createElement('div');
            box.className = 'msg-box';
            box.innerText = text;
            
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        // Рендер медиа/документов блоков в DOM
        function renderFileMessage(filename, filetype, dataUrl, side) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (filetype.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = dataUrl;
                box.appendChild(img);
            } else if (filetype.startsWith('audio/')) {
                const audio = document.createElement('audio');
                audio.src = dataUrl;
                audio.controls = true;
                audio.preload = "metadata";
                
                const metaText = document.createElement('div');
                metaText.style.fontSize = '0.8rem';
                metaText.style.marginBottom = '4px';
                metaText.style.color = 'var(--text-muted)';
                metaText.innerText = filename;
                
                box.appendChild(metaText);
                box.appendChild(audio);
            } else {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                link.className = 'file-link';
                link.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 18 15 15"></polyline></svg>
                    <span>${filename}</span>
                `;
                box.appendChild(link);
            }
            
            wrapper.appendChild(box);
            container.appendChild(wrapper);

    </script>
