<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Workspace Pro</title>
    <style>
        :root {
            --bg-outer: #f4f5f6;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --border: #f0f0f2;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --accent: #000000;
            --accent-text: #ffffff;
            --bubble-in: #ffffff;
            --bubble-in-border: #e1e4e8;
            --bubble-out: #f0f2f5;
            --badge-bg: #fff8ec;
            --badge-text: #b07d1a;
            --icon-color: #636c76;
            
            --tg-voice-bg: #f4f5f7;
            --tg-voice-btn: #2481cc;
            --tg-voice-btn-icon: #ffffff;
            --tg-voice-seek: #d0d5dd;
            --tg-voice-progress: #2481cc;
            --reply-line: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-outer: #0a0b0d;
                --bg-card: #16181c;
                --bg-input: #22262c;
                --border: #2d3139;
                --text-main: #e6edf3;
                --text-muted: #8b949e;
                --accent: #ffffff;
                --accent-text: #16181c;
                --bubble-in: #1f242c;
                --bubble-in-border: #2d3139;
                --bubble-out: #282e38;
                --badge-bg: #2c2214;
                --badge-text: #e3b341;
                --icon-color: #8b949e;

                --tg-voice-bg: #1a222c;
                --tg-voice-btn: #5288c1;
                --tg-voice-btn-icon: #ffffff;
                --tg-voice-seek: #343e4d;
                --tg-voice-progress: #5288c1;
                --reply-line: #ffffff;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-outer);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: 20px;
        }

        .workspace {
            width: 100%;
            max-width: 960px;
            height: 100%;
            background-color: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
            background-color: var(--bg-card);
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .status-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--badge-text);
            border-radius: 50%;
        }
        .status-badge.connected {
            background-color: rgba(35, 165, 90, 0.1);
            color: #23a55a;
        }
        .status-badge.connected::before {
            background-color: #23a55a;
        }
        .status-badge.typing {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .status-badge.typing::before {
            background-color: var(--text-muted);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.3; } to { opacity: 1; }
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .p2p-panel {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: 100%;
            background-color: var(--bg-card);
            z-index: 30;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            scrollbar-width: thin;
        }

        .p2p-panel.collapsed {
            margin-left: -300px;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 8px;
        }

        .p2p-panel button {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .p2p-panel button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .p2p-panel button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .p2p-panel button.danger-link {
            background-color: transparent;
            border: 1px dashed rgba(255, 77, 79, 0.3);
            color: #ff4d4f;
            margin-top: auto;
            padding: 8px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-size: 0.85rem;
        }

        textarea.token-area {
            width: 100%;
            height: 65px;
            background-color: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 10px;
            color: var(--text-main);
            padding: 12px 14px;
            font-size: 0.9rem;
            line-height: 1.4;
            resize: none;
            outline: none;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            overflow: hidden;
            height: 100%;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            position: relative;
            margin-bottom: 6px;
        }
        .msg-wrapper.in { align-self: flex-start; }
        .msg-wrapper.out { align-self: flex-end; }

        .msg-box {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        .msg-wrapper.in .msg-box {
            background-color: var(--bubble-in);
            color: var(--text-main);
            border: 1px solid var(--bubble-in-border);
            border-top-left-radius: 4px;
        }
        .msg-wrapper.out .msg-box {
            background-color: var(--bubble-out);
            color: var(--text-main);
            border-top-right-radius: 4px;
        }

        .msg-box img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .reply-quote {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.03);
            border-left: 3px solid var(--reply-line);
            border-radius: 4px;
            padding: 4px 10px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            text-align: left;
        }
        
        .reply-quote-sender {
            color: var(--reply-line);
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .reply-quote-text {
            color: var(--text-main);
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .active-reply-indicator {
            display: none;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            border-left: 3px solid var(--reply-line);
            padding: 8px 16px;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        .active-reply-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .active-reply-title {
            color: var(--reply-line);
            font-weight: 600;
            font-size: 0.8rem;
        }

        .active-reply-text {
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .active-reply-close {
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .tg-voice-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--tg-voice-bg);
            padding: 8px 14px;
            border-radius: 14px;
            min-width: 220px;
            margin-top: 4px;
            user-select: none;
        }

        .tg-play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: var(--tg-voice-btn);
            color: var(--tg-voice-btn-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tg-voice-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tg-timeline {
            position: relative;
            height: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .tg-waveform-bg {
            width: 100%;
            height: 3px;
            background-color: var(--tg-voice-seek);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .tg-waveform-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--tg-voice-progress);
            transition: width 0.1s linear;
        }

        .tg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            margin-top: 4px;
        }

        .modes-bar {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        
        .modes-left {
            display: flex;
            gap: 8px;
        }

        .pill-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }
        .pill-btn.active {
            background-color: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        .input-container {
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 4px 6px 4px 16px;
            gap: 12px;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .input-wrapper input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.95rem;
            height: 40px;
        }

        .input-icon {
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
            flex-shrink: 0;
            padding: 4px;
        }

        .input-icon.recording {
            color: #ff4d4f;
            animation: pulse 0.8s infinite alternate;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--border);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: not-allowed;
            color: var(--text-muted);
            transition: all 0.2s;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .btn-send.active {
            background-color: var(--accent);
            color: var(--accent-text);
            cursor: pointer;
            opacity: 1;
        }

        .p2p-progress-toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: none;
            z-index: 500;
        }

        /* Полное контекстное меню в стиле Telegram */
        .msg-context-menu {
            position: fixed;
            z-index: 1000;
            width: 220px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
            animation: menuFadeIn 0.12s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Панель реакций сверху */
        .reactions-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px 8px 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .reaction-item {
            font-size: 1.25rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
        }
        .reaction-item:hover {
            transform: scale(1.25);
        }
        .reaction-item.more-btn {
            background-color: var(--bg-input);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Элементы списка меню с иконками */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        .menu-item:hover {
            background-color: var(--bg-input);
        }
        .menu-item svg {
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .menu-item.danger {
            color: #ff4d4f;
        }
        .menu-item.danger svg {
            color: #ff4d4f;
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .workspace { max-width: 100%; height: 100dvh; border-radius: 0; border: none; }
            .input-container { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
            .p2p-panel { 
                position: absolute; left: 0; top: 0; bottom: 0; width: 290px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
                transform: translateX(-100%); margin-left: 0 !important;
            }
            .p2p-panel.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="p2p-progress-toast" id="p2pProgress">Передача: 0%</div>

    <div class="workspace">
        <div class="header">
            <div class="header-title">P2P Workspace Pro</div>
            <div class="header-controls">
                <div id="status" class="status-badge">Ожидание p2p</div>
                <button class="btn-icon" onclick="togglePanel()" title="Конфигурация шлюза">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1  1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="p2p-panel" id="p2pPanel">
                <div class="panel-title">Шаг 1: Инициализация</div>
                <button onclick="createOffer()">Создать комнату</button>
                
                <div class="panel-title">Ваш токен связи:</div>
                <textarea id="localKey" class="token-area" readonly placeholder="Токен сгенерируется автоматически"></textarea>
                
                <div class="panel-title">Шаг 2: Удалённый узел</div>
                <textarea id="remoteKey" class="token-area" placeholder="Вставьте токен пира или перейдите по шеринг-ссылке"></textarea>
                <button onclick="acceptRemoteKey()">Подключить токен</button>
                
                <div class="panel-title">Параметры безопасности</div>
                <select id="cryptoType">
                    <option value="webrtc">Стандартное (WebRTC DTLS/SRTP)</option>
                </select>

                <label class="panel-title" style="display:block; margin-top:8px; margin-bottom:4px;">ICE-Инфраструктура</label>
                <select id="iceConfig" onchange="updateIceConfig()">
                    <option value="google">Google STUN (Внешняя сеть)</option>
                    <option value="local">Localhost / LAN</option>
                </select>
                
                <div class="panel-title">Быстрое подключение</div>
                <button class="secondary" id="btnShareCode" onclick="shareConnectionLink()">🔗 Поделиться ссылкой</button>
                
                <button class="danger-link" onclick="clearHistory()">🗑 Очистить историю чата</button>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messages"></div>

                <div class="modes-bar">
                    <div class="modes-left">
                        <button class="pill-btn active">💬 Диалог</button>
                    </div>
                </div>

                <div class="active-reply-indicator" id="activeReplyIndicator">
                    <div class="active-reply-info">
                        <div class="active-reply-title" id="activeReplySender">Ответ на сообщение</div>
                        <div class="active-reply-text" id="activeReplyText">Текст...</div>
                    </div>
                    <div class="active-reply-close" onclick="cancelReply()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <input type="file" id="fileField" onchange="processFileSelection(this)" style="display:none">
                        
                        <div class="input-icon" onclick="document.getElementById('fileField').click()" title="Выбрать файл">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </div>

                        <div class="input-icon" id="micBtn" onclick="toggleVoiceRecord()" title="Записать голос">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </div>
                        
                        <input type="text" id="msgInput" placeholder="Введите текст сообщения..." oninput="sendTypingSignal()" onkeydown="if(event.key === 'Enter') sendMessage()" disabled>
                        
                        <button id="btnSend" class="btn-send" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Обновленное контекстное меню в стиле Telegram -->
    <div class="msg-context-menu" id="msgContextMenu">
        <div class="reactions-panel">
            <div class="reaction-item" onclick="triggerReaction('💖')">💖</div>
            <div class="reaction-item" onclick="triggerReaction('👍')">👍</div>
            <div class="reaction-item" onclick="triggerReaction('👌')">👌</div>
            <div class="reaction-item" onclick="triggerReaction('🏆')">🏆</div>
            <div class="reaction-item" onclick="triggerReaction('❤️')">❤️</div>
            <div class="reaction-item" onclick="triggerReaction('🙏')">🙏</div>
            <div class="reaction-item" onclick="triggerReaction('🔥')">🔥</div>
            <div class="reaction-item more-btn">∨</div>
        </div>
        <div class="menu-item" onclick="contextReply()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"></polyline><path d="M20 18v-2a4 4 0 0 0-4-4H4"></path></svg>
            Ответить
        </div>
        <div class="menu-item" onclick="contextCopy()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Копировать
        </div>
        <div class="menu-item" onclick="contextForward()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"></polyline><path d="M4 18v-2a4 4 0 0 1 4-4h12"></path></svg>
            Переслать
        </div>
        <div class="menu-item" onclick="contextPin()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.12-2.65A2 2 0 0 1 16 10.11V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v6.11c0 .43-.14.85-.4 1.19L5.44 14a2 2 0 0 0-.44 1.24z"></path></svg>
            Закрепить
        </div>
        <div class="menu-item danger" onclick="contextDelete()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            Удалить
        </div>
    </div>

    <script>
        let peerConnection;
        let dataChannel;
        let typingTimeout;
        let isConnectedState = false;
        let chatHistory = [];
        let activeContextMenuTarget = null;
        let currentReplyTarget = null;

        let incomingFileBuffer = [];
        let incomingFileName = '';
        let incomingFileType = '';
        let incomingFileReply = null;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        let currentIceServers = [{ urls: 'stun:stun.l.google.com:19302' }];

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('p2p_chat_history');
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(msg => {
                        if (msg.msgType === 'text') renderTextMessage(msg.payload, msg.side, msg.id, msg.replyTo);
                        else if (msg.msgType === 'file') renderFileMessage(msg.filename, msg.filetype, msg.payload, msg.side, msg.id, msg.replyTo);
                        else if (msg.msgType === 'voice') renderVoiceMessage(msg.payload, msg.side, msg.id, msg.replyTo);
                    });
                } catch (e) { console.error(e); }
            } else {
                renderTextMessage("Чат готов к работе.", 'in');
            }

            if (window.location.hash && window.location.hash.length > 1) {
                processIncomingHash();
            }
        });

        async function processIncomingHash() {
            const incomingToken = window.location.hash.substring(1);
            document.getElementById('remoteKey').value = incomingToken;
            setStatus('Установка соединения по ссылке...');
            try {
                const remoteDesc = JSON.parse(atob(incomingToken));
                peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
                peerConnection.ondatachannel = (e) => setupDataChannel(e.channel);
                bindPeerEvents(peerConnection);
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                setTimeout(() => {
                    const sdpData = { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp };
                    const responseToken = btoa(JSON.stringify(sdpData));
                    document.getElementById('localKey').value = responseToken;
                    navigator.clipboard.writeText(responseToken).then(() => {
                        alert("Ответный токен скопирован. Передайте его инициатору для завершения рукопожатия!");
                    });
                }, 500);
            } catch(e) { setStatus('Ошибка разбора хеш-ссылки'); }
        }

        function setStatus(text, state = 'default') {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.className = 'status-badge'; 
            if (state === 'connected') statusEl.classList.add('connected');
            if (state === 'typing') statusEl.classList.add('typing');
        }

        function togglePanel() {
            const panel = document.getElementById('p2pPanel');
            if (window.innerWidth <= 680) panel.classList.toggle('open');
            else panel.classList.toggle('collapsed');
        }

        function generateLocalToken() {
            if (!peerConnection || !peerConnection.localDescription) return;
            const sdpData = { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp };
            document.getElementById('localKey').value = btoa(JSON.stringify(sdpData));
        }

        function bindPeerEvents(pc) {
            pc.onicecandidate = () => generateLocalToken();
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'checking') setStatus('Синхронизация...');
                if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') setStatus('В сети', 'connected');
                if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    setStatus('Разъединено');
                    toggleInterfaceStates(false);
                }
            };
        }

        async function createOffer() {
            peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
            setupDataChannel(peerConnection.createDataChannel("chat"));
            bindPeerEvents(peerConnection);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            generateLocalToken();
        }

        async function acceptRemoteKey() {
            const rawKey = document.getElementById('remoteKey').value.trim();
            if (!rawKey) return alert('Поместите токен в поле ввода.');
            try {
                const remoteDesc = JSON.parse(atob(rawKey));
                if (!peerConnection) {
                    peerConnection = new RTCPeerConnection({ iceServers: currentIceServers });
                    peerConnection.ondatachannel = (e) => setupDataChannel(e.channel);
                    bindPeerEvents(peerConnection);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    generateLocalToken();
                } else {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                }
            } catch (err) { alert('Ошибка структуры ключа.'); }
        }

        function toggleInterfaceStates(enabled) {
            document.getElementById('msgInput').disabled = !enabled;
            const sendBtn = document.getElementById('btnSend');
            sendBtn.disabled = !enabled;
            if(enabled) sendBtn.classList.add('active'); else sendBtn.classList.remove('active');
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            dataChannel.bufferedAmountLowThreshold = 16384; 

            dataChannel.onopen = () => {
                isConnectedState = true;
                setStatus('В сети', 'connected');
                toggleInterfaceStates(true);
                document.getElementById('p2pPanel').classList.remove('open');
            };
            dataChannel.onclose = () => {
                isConnectedState = false;
                setStatus('Разъединено');
                toggleInterfaceStates(false);
            };
            dataChannel.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'typing') {
                        setStatus(data.isTyping ? 'Печатает...' : 'В сети', data.isTyping ? 'typing' : 'connected');
                    } else if (data.type === 'text') {
                        const mId = data.id || 'msg_' + Date.now();
                        renderTextMessage(data.payload, 'in', mId, data.replyTo);
                        saveToStorage({ id: mId, msgType: 'text', payload: data.payload, side: 'in', replyTo: data.replyTo });
                    } 
                    else if (data.type === 'file-start') {
                        incomingFileBuffer = [];
                        incomingFileName = data.filename;
                        incomingFileType = data.filetype;
                        incomingFileReply = data.replyTo;
                        document.getElementById('p2pProgress').style.display = 'block';
                        document.getElementById('p2pProgress').innerText = 'Получение файла...';
                    } else if (data.type === 'file-chunk') {
                        incomingFileBuffer.push(data.chunk);
                        if (data.pct) document.getElementById('p2pProgress').innerText = `Получение: ${data.pct}%`;
                    } else if (data.type === 'file-end') {
                        document.getElementById('p2pProgress').style.display = 'none';
                        const fullPayload = incomingFileBuffer.join('');
                        const mId = data.id || 'msg_' + Date.now();
                        
                        if (incomingFileType.startsWith('audio/')) {
                            renderVoiceMessage(fullPayload, 'in', mId, incomingFileReply);
                            saveToStorage({ id: mId, msgType: 'voice', payload: fullPayload, side: 'in', replyTo: incomingFileReply });
                        } else {
                            renderFileMessage(incomingFileName, incomingFileType, fullPayload, 'in', mId, incomingFileReply);
                            saveToStorage({ id: mId, msgType: 'file', filename: incomingFileName, filetype: incomingFileType, payload: fullPayload, side: 'in', replyTo: incomingFileReply });
                        }
                        incomingFileBuffer = [];
                    }
                } catch(err) {
                    const mId = 'msg_' + Date.now();
                    renderTextMessage(e.data, 'in', mId);
                    saveToStorage({ id: mId, msgType: 'text', payload: e.data, side: 'in' });
                }
            };
        }

        function sendTypingSignal() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            dataChannel.send(JSON.stringify({ type: 'typing', isTyping: true }));
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                dataChannel.send(JSON.stringify({ type: 'typing', isTyping: false }));
            }, 1500);
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
            
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const packet = { type: 'text', payload: text, id: mId, replyTo: currentReplyTarget };
            
            dataChannel.send(JSON.stringify(packet));
            renderTextMessage(text, 'out', mId, currentReplyTarget);
            saveToStorage({ id: mId, msgType: 'text', payload: text, side: 'out', replyTo: currentReplyTarget });
            
            input.value = '';
            cancelReply();
        }

        function sendMediaDataInChunks(base64Data, filename, mimeType) {
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const progressIndicator = document.getElementById('p2pProgress');
            progressIndicator.style.display = 'block';

            dataChannel.send(JSON.stringify({
                type: 'file-start',
                filename: filename,
                filetype: mimeType,
                replyTo: currentReplyTarget
            }));

            const CHUNK_SIZE = 16384;
            let offset = 0;

            function sendNextChunk() {
                while (offset < base64Data.length) {
                    if (dataChannel.bufferedAmount > dataChannel.bufferedAmountLowThreshold) {
                        dataChannel.onbufferedamountlow = () => {
                            dataChannel.onbufferedamountlow = null;
                            sendNextChunk();
                        };
                        return;
                    }

                    const chunk = base64Data.slice(offset, offset + CHUNK_SIZE);
                    offset += CHUNK_SIZE;
                    const pct = Math.min(100, Math.floor((offset / base64Data.length) * 100));
                    
                    progressIndicator.innerText = `Отправка: ${pct}%`;
                    dataChannel.send(JSON.stringify({ type: 'file-chunk', chunk: chunk, pct: pct }));
                }

                if (offset >= base64Data.length) {
                    progressIndicator.style.display = 'none';
                    dataChannel.send(JSON.stringify({ type: 'file-end', id: mId }));
                    
                    if (mimeType.startsWith('audio/')) {
                        renderVoiceMessage(base64Data, 'out', mId, currentReplyTarget);
                        saveToStorage({ id: mId, msgType: 'voice', payload: base64Data, side: 'out', replyTo: currentReplyTarget });
                    } else {
                        renderFileMessage(filename, mimeType, base64Data, 'out', mId, currentReplyTarget);
                        saveToStorage({ id: mId, msgType: 'file', filename: filename, filetype: mimeType, payload: base64Data, side: 'out', replyTo: currentReplyTarget });
                    }
                    cancelReply();
                }
            }
            sendNextChunk();
        }

        function processFileSelection(input) {
            const file = input.files[0];
            if (!file || !dataChannel || dataChannel.readyState !== 'open') return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                let binary = '';
                const bytes = new Uint8Array(arrayBuffer);
                const len = bytes.byteLength;
                for (let i = 0; i < len; i++) binary += String.fromCharCode(bytes[i]);
                
                const mime = file.type || "application/octet-stream";
                const base64Data = `data:${mime};base64,` + btoa(binary);
                sendMediaDataInChunks(base64Data, file.name, mime);
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        async function toggleVoiceRecord() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            const micBtn = document.getElementById('micBtn');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            sendMediaDataInChunks(reader.result, 'voice.webm', 'audio/webm');
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                } catch (err) {
                    alert('Доступ к микрофону заблокирован или не поддерживается.');
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                micBtn.classList.remove('recording');
            }
        }

        function renderTextMessage(text, side, id, replyTo = null) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }
            
            const textContent = document.createElement('span');
            textContent.innerText = text;
            box.appendChild(textContent);
            
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, text, side); });
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function renderFileMessage(filename, filetype, dataUrl, side, id, replyTo = null) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }

            if (filetype.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = dataUrl;
                box.appendChild(img);
            } else {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                link.className = 'file-link';
                link.innerHTML = `<span>📁 ${filename}</span>`;
                box.appendChild(link);
            }
            
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, filename, side); });
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function renderVoiceMessage(dataUrl, side, id, replyTo = null) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }

            const audio = new Audio(dataUrl);
            
            const playerDiv = document.createElement('div');
            playerDiv.className = 'tg-voice-player';
            playerDiv.innerHTML = `
                <button class="tg-play-btn">▶</button>
                <div class="tg-voice-info">
                    <div class="tg-timeline">
                        <div class="tg-waveform-bg">
                            <div class="tg-waveform-progress"></div>
                        </div>
                    </div>
                    <span class="tg-time">0:00</span>
                </div>
            `;

            const playBtn = playerDiv.querySelector('.tg-play-btn');
            const progress = playerDiv.querySelector('.tg-waveform-progress');
            const timeEl = playerDiv.querySelector('.tg-time');
            const timeline = playerDiv.querySelector('.tg-timeline');

            audio.addEventListener('loadedmetadata', () => {
                const min = Math.floor(audio.duration / 60);
                const sec = Math.floor(audio.duration % 60);
                timeEl.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            });

            audio.addEventListener('timeupdate', () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${pct}%`;
                const min = Math.floor(audio.currentTime / 60);
                const sec = Math.floor(audio.currentTime % 60);
                timeEl.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            });

            audio.addEventListener('ended', () => {
                playBtn.innerText = '▶';
                progress.style.width = '0%';
            });

            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play();
                    playBtn.innerText = '⏸';
                } else {
                    audio.pause();
                    playBtn.innerText = '▶';
                }
            });

            timeline.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = timeline.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const pct = clickX / rect.width;
                audio.currentTime = pct * audio.duration;
            });

            box.appendChild(playerDiv);
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, 'Голосовое сообщение', side); });
            wrapper.appendChild(box);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function openContextMenu(e, msgId, textContent, side) {
            const menu = document.getElementById('msgContextMenu');
            activeContextMenuTarget = { id: msgId, text: textContent, sender: side };
            menu.style.display = 'flex';
            
            let top = e.clientY;
            let left = e.clientX;
            if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
            if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
            
            menu.style.top = `${top}px`;
            menu.style.left = `${left}px`;
        }

        function closeContextMenu() { document.getElementById('msgContextMenu').style.display = 'none'; }
        document.addEventListener('click', closeContextMenu);

        function triggerReaction(emoji) {
            console.log(`Реакция ${emoji} выбрана для сообщения:`, activeContextMenuTarget?.id);
            closeContextMenu();
        }

        function contextCopy() {
            if (activeContextMenuTarget) navigator.clipboard.writeText(activeContextMenuTarget.text);
        }

        function contextDelete() {
            if (!activeContextMenuTarget) return;
            const tid = activeContextMenuTarget.id;
            const el = document.querySelector(`[data-msg-id="${tid}"]`);
            if (el) el.remove();
            chatHistory = chatHistory.filter(m => m.id !== tid);
            localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory));
        }

        function contextReply() {
            if (!activeContextMenuTarget) return;
            currentReplyTarget = { id: activeContextMenuTarget.id, text: activeContextMenuTarget.text, sender: activeContextMenuTarget.sender };
            
            const indicator = document.getElementById('activeReplyIndicator');
            document.getElementById('activeReplySender').innerText = activeContextMenuTarget.sender === 'out' ? 'Ответ на ваше сообщение' : 'Ответ собеседнику';
            document.getElementById('activeReplyText').innerText = activeContextMenuTarget.text;
            indicator.style.display = 'flex';
            document.getElementById('msgInput').focus();
        }

        function contextForward() {
            console.log("Переслать:", activeContextMenuTarget?.text);
        }

        function contextPin() {
            console.log("Закрепить:", activeContextMenuTarget?.text);
        }

        function cancelReply() {
            currentReplyTarget = null;
            document.getElementById('activeReplyIndicator').style.display = 'none';
        }

        function saveToStorage(obj) {
            chatHistory.push(obj);
            try { localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory)); } catch(e) { chatHistory.shift(); }
        }

        function clearHistory() {
            if (confirm("Удалить историю локально?")) {
                localStorage.removeItem('p2p_chat_history');
                chatHistory = [];
                document.getElementById('messages').innerHTML = '';
            }
        }

        async function shareConnectionLink() {
            const localKeyVal = document.getElementById('localKey').value.trim();
            if (!localKeyVal) return alert("Сначала создайте комнату!");
            const shareUrl = `${window.location.origin}${window.location.pathname}#${localKeyVal}`;
            await navigator.clipboard.writeText(shareUrl);
            alert("Ссылка скопирована.");
        }

        function updateIceConfig() {
            const type = document.getElementById('iceConfig').value;
            currentIceServers = (type === 'google') ? [{ urls: 'stun:stun.l.google.com:19302' }] : [];
        }
    </script>
