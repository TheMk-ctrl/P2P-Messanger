<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Workspace Pro</title>
    <!-- ПОДКЛЮЧЕНИЕ БИБЛИОТЕК -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-outer: #f4f5f6;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --border: #f0f0f2;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --accent: #000000;
            --accent-text: #ffffff;
            --bubble-in: #ffffff;
            --bubble-in-border: #e1e4e8;
            --bubble-out: #f0f2f5;
            --badge-bg: #fff8ec;
            --badge-text: #b07d1a;
            --icon-color: #636c76;
            
            --tg-voice-bg: #f4f5f7;
            --tg-voice-btn: #2481cc;
            --tg-voice-btn-icon: #ffffff;
            --tg-voice-seek: #d0d5dd;
            --tg-voice-progress: #2481cc;
            --reply-line: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-outer: #0a0b0d;
                --bg-card: #16181c;
                --bg-input: #22262c;
                --border: #2d3139;
                --text-main: #e6edf3;
                --text-muted: #8b949e;
                --accent: #ffffff;
                --accent-text: #16181c;
                --bubble-in: #1f242c;
                --bubble-in-border: #2d3139;
                --bubble-out: #282e38;
                --badge-bg: #2c2214;
                --badge-text: #e3b341;
                --icon-color: #8b949e;

                --tg-voice-bg: #1a222c;
                --tg-voice-btn: #5288c1;
                --tg-voice-btn-icon: #ffffff;
                --tg-voice-seek: #343e4d;
                --tg-voice-progress: #5288c1;
                --reply-line: #ffffff;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-outer);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: 20px;
        }

        .workspace {
            width: 100%;
            max-width: 960px;
            height: 100%;
            background-color: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
            background-color: var(--bg-card);
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .status-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--badge-text);
            border-radius: 50%;
        }
        .status-badge.connected {
            background-color: rgba(35, 165, 90, 0.1);
            color: #23a55a;
        }
        .status-badge.connected::before {
            background-color: #23a55a;
        }
        .status-badge.typing {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .status-badge.typing::before {
            background-color: var(--text-muted);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.3; } to { opacity: 1; }
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .p2p-panel {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: 100%;
            background-color: var(--bg-card);
            z-index: 30;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            scrollbar-width: thin;
        }

        .p2p-panel.collapsed {
            margin-left: -300px;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 8px;
        }

        .p2p-panel button {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .p2p-panel button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .p2p-panel button.danger-link {
            background-color: transparent;
            border: 1px dashed rgba(255, 77, 79, 0.3);
            color: #ff4d4f;
            margin-top: auto;
            padding: 8px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-size: 0.85rem;
        }

        .id-input-wrapper {
            display: flex;
            gap: 6px;
        }

        .id-input-wrapper input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-size: 0.85rem;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            overflow: hidden;
            height: 100%;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            position: relative;
            margin-bottom: 6px;
        }
        .msg-wrapper.in { align-self: flex-start; align-items: flex-start; }
        .msg-wrapper.out { align-self: flex-end; align-items: flex-end; }

        .msg-box {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        .msg-wrapper.in .msg-box {
            background-color: var(--bubble-in);
            color: var(--text-main);
            border: 1px solid var(--bubble-in-border);
            border-top-left-radius: 4px;
        }
        .msg-wrapper.out .msg-box {
            background-color: var(--bubble-out);
            color: var(--text-main);
            border-top-right-radius: 4px;
        }

        .msg-box img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .msg-box a {
            color: var(--tg-voice-progress);
            text-decoration: underline;
        }

        .msg-reactions-container {
            display: flex;
            gap: 4px;
            margin-top: -6px;
            z-index: 2;
            padding: 0 8px;
        }
        .msg-reaction-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            animation: menuFadeIn 0.15s ease;
        }

        .reply-quote {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.03);
            border-left: 3px solid var(--reply-line);
            border-radius: 4px;
            padding: 4px 10px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            text-align: left;
        }
        
        .reply-quote-sender {
            color: var(--reply-line);
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .reply-quote-text {
            color: var(--text-main);
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .active-reply-indicator {
            display: none;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            border-left: 3px solid var(--reply-line);
            padding: 8px 16px;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        .active-reply-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .active-reply-title {
            color: var(--reply-line);
            font-weight: 600;
            font-size: 0.8rem;
        }

        .active-reply-text {
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .active-reply-close {
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .tg-voice-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--tg-voice-bg);
            padding: 8px 14px;
            border-radius: 14px;
            min-width: 220px;
            margin-top: 4px;
            user-select: none;
        }

        .tg-play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: var(--tg-voice-btn);
            color: var(--tg-voice-btn-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tg-voice-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tg-timeline {
            position: relative;
            height: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .tg-waveform-bg {
            width: 100%;
            height: 3px;
            background-color: var(--tg-voice-seek);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .tg-waveform-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--tg-voice-progress);
            transition: width 0.1s linear;
        }

        .tg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            margin-top: 4px;
        }

        .modes-bar {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .modes-left {
            display: flex;
            gap: 8px;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border-radius: 12px;
            padding: 2px 8px;
            width: 180px;
        }

        .search-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.8rem;
            color: var(--text-main);
        }

        .pill-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }
        .pill-btn.active {
            background-color: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        .input-container {
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 4px 6px 4px 16px;
            gap: 8px;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .input-wrapper input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.95rem;
            height: 40px;
            min-width: 0;
        }

        .input-icon {
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
            flex-shrink: 0;
            padding: 6px;
            width: 32px;
            height: 32px;
        }

        .input-icon.recording {
            color: #ff4d4f;
            animation: pulse 0.8s infinite alternate;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--border);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: not-allowed;
            color: var(--text-muted);
            transition: all 0.2s;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .btn-send.active {
            background-color: var(--accent);
            color: var(--accent-text);
            cursor: pointer;
            opacity: 1;
        }

        .p2p-progress-toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: none;
            z-index: 500;
        }

        .msg-context-menu {
            position: fixed;
            z-index: 1000;
            width: 220px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
            animation: menuFadeIn 0.12s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .reactions-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px 8px 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .reaction-item {
            font-size: 1.25rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
        }
        .reaction-item:hover {
            transform: scale(1.25);
        }
        .reaction-item.more-btn {
            background-color: var(--bg-input);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: bold;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        .menu-item:hover {
            background-color: var(--bg-input);
        }
        .menu-item svg {
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .menu-item.danger {
            color: #ff4d4f;
        }
        .menu-item.danger svg {
            color: #ff4d4f;
        }

        /* Дополнительные медиа/звонки UI */
        .shared-media-container {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            align-content: start;
        }
        .media-thumb {
            aspect-ratio: 1;
            border-radius: 8px;
            background-color: var(--bg-input);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .call-overlay {
            position: absolute;
            top: 0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            gap: 20px;
        }
        .call-btn-hangup {
            background: #ff4d4f;
            border: none; color: white;
            padding: 12px 24px; border-radius: 30px;
            cursor: pointer; font-weight: bold;
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .workspace { max-width: 100%; height: 100dvh; border-radius: 0; border: none; }
            .input-container { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
            .p2p-panel { 
                position: absolute; left: 0; top: 0; bottom: 0; width: 290px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
                transform: translateX(-100%); margin-left: 0 !important;
            }
            .p2p-panel.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="p2p-progress-toast" id="p2pProgress">Передача: 0%</div>

    <div class="workspace">
        <div class="call-overlay" id="callOverlay">
            <h2 id="callStatusText">Аудиозвонок...</h2>
            <audio id="remoteAudio" autoplay></audio>
            <button class="call-btn-hangup" onclick="hangUpCall()">Завершить</button>
        </div>

        <div class="header">
            <div class="header-title" id="chatTitle">Загрузка...</div>
            <div class="header-controls">
                <button class="btn-icon" id="callBtn" onclick="startAudioCall()" style="display:none;" title="Позвонить пиру">📞</button>
                <div id="status" class="status-badge">Инициализация</div>
                <button class="btn-icon" onclick="togglePanel()" title="Конфигурация шлюза">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1  1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="p2p-panel" id="p2pPanel">
                <div class="panel-title">Мой Уникальный ID</div>
                <div class="id-input-wrapper">
                    <input type="text" id="myIdField" placeholder="Введите ваш ID">
                    <button onclick="updateMyId()">ОК</button>
                </div>
                
                <div class="panel-title">Поиск собеседника</div>
                <div class="id-input-wrapper">
                    <input type="text" id="searchIdField" placeholder="ID человека">
                    <button onclick="searchAndConnect()">Найти</button>
                </div>
                
                <div class="panel-title">Секретный Ключ E2EE</div>
                <div class="id-input-wrapper">
                    <input type="password" id="e2eeKeyField" placeholder="Ключ шифрования" oninput="deriveCryptoKeyFromInput()">
                </div>
                
                <label class="panel-title" style="display:block; margin-top:8px; margin-bottom:4px;">ICE-Инфраструктура</label>
                <select id="iceConfig" onchange="updateIceConfig()">
                    <option value="global">Cloudflare + Google STUN (Макс. доступность)</option>
                    <option value="google">Только Google STUN</option>
                    <option value="local">Localhost / LAN (Без серверов)</option>
                </select>
                
                <button class="danger-link" onclick="clearHistory()">🗑 Очистить историю чата</button>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messages"></div>
                <div class="shared-media-container" id="sharedMedia"></div>

                <div class="modes-bar">
                    <div class="modes-left">

        </div>

    <script>
        // PEER JS LOGIC
        let peer = null;
        let dataChannel = null; 
        let currentCall = null;
        let localAudioStream = null;
        
        let myUserId = '';
        let targetUserId = ''; 

        let typingTimeout;
        let heartbeatInterval = null;
        let isConnectedState = false;
        let chatHistory = [];
        let activeContextMenuTarget = null;
        let currentReplyTarget = null;
        let activeTab = 'dialog';

        let incomingFileBuffer = [];
        let incomingFileName = '';
        let incomingFileType = '';
        let incomingFileReply = null;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // E2EE Переменные (CryptoKey объект)
        let derivedE2eeKey = null;
        const CRYPTO_SALT = CryptoJS.enc.Hex.parse("4d61785369646f726f765032504368617453616c74"); // Статическая соль

        let currentIceServers = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' }
        ];

        // Настройка парсера Markdown
        marked.setOptions({ gfm: true, breaks: true, pure: true });

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('p2p_chat_history');
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    renderAllMessages(chatHistory);
                } catch (e) { console.error(e); }
            } else {
                renderTextMessage("Чат готов. Задайте общий **Секретный Ключ E2EE** с пиром для приватного общения.", 'in', 'welcome_msg');
            }

            myUserId = localStorage.getItem('p2p_my_id');
            if (!myUserId || myUserId.trim() === "") {
                myUserId = 'peer_' + Math.random().toString(36).substr(2, 6);
                localStorage.setItem('p2p_my_id', myUserId);
            }
            document.getElementById('myIdField').value = myUserId;
            document.getElementById('chatTitle').innerText = `Вы: ${myUserId}`;

            // Восстановление пароля E2EE из сессии если был
            const savedPass = sessionStorage.getItem('p2p_e2ee_pass');
            if (savedPass) {
                document.getElementById('e2eeKeyField').value = savedPass;
                deriveCryptoKeyFromInput();
            }

            initPeerJS();
        });

        // 1. КРИПТОГРАФИЯ: Деривация ключа PBKDF2 -> AES-GCM 256
        async function deriveCryptoKeyFromInput() {
            const password = document.getElementById('e2eeKeyField').value;
            if (!password) {
                derivedE2eeKey = null;
                sessionStorage.removeItem('p2p_e2ee_pass');
                return;
            }
            sessionStorage.setItem('p2p_e2ee_pass', password);

            const baseKey = await crypto.subtle.importKey(
                "raw",
                new TextEncoder().encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );

            // Соль переводим в Uint8Array
            const saltBytes = new Uint8Array(CRYPTO_SALT.words.length * 4);
            for (let i = 0; i < CRYPTO_SALT.words.length; i++) {
                const word = CRYPTO_SALT.words[i];
                saltBytes[i * 4] = (word >> 24) & 0xFF;
                saltBytes[i * 4 + 1] = (word >> 16) & 0xFF;
                saltBytes[i * 4 + 2] = (word >> 8) & 0xFF;
                saltBytes[i * 4 + 3] = word & 0xFF;
            }

            derivedE2eeKey = await crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: saltBytes,
                    iterations: 100000,
                    hash: "SHA-256"
                },
                baseKey,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptData(stringData) {
            if (!derivedE2eeKey) return { encrypted: false, payload: stringData };
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(stringData);
            
            const ciphertext = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                derivedE2eeKey,
                encoded
            );

            return {
                encrypted: true,
                iv: Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join(''),
                ciphertext: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
            };
        }

        async function decryptData(packet) {
            if (!packet.encrypted) return packet.payload;
            if (!derivedE2eeKey) return "🚨 [Сообщение зашифровано. Введите верный E2EE ключ в панели]";

            try {
                const iv = new Uint8Array(packet.iv.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const encryptedBytes = new Uint8Array(atob(packet.ciphertext).split("").map(c => c.charCodeAt(0)));
                
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    derivedE2eeKey,
                    encryptedBytes
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "🚨 [Ошибка декодирования E2EE. Неверный ключ шлюза]";
            }
        }

        function initPeerJS() {
            setStatus('Подключение к сети...');
            
            peer = new Peer(myUserId, {
                config: { iceServers: currentIceServers, sdpSemantics: 'unified-plan' },
                secure: true, debug: 0
            });

            peer.on('open', (id) => {
                myUserId = id;
                localStorage.setItem('p2p_my_id', myUserId);
                document.getElementById('chatTitle').innerText = `Вы: ${myUserId}`;
                setStatus('Сервер онлайн', 'connected');
            });

            peer.on('connection', (conn) => {
                if (dataChannel && dataChannel.open) { conn.close(); return; }
                targetUserId = conn.peer;
                setupDataChannel(conn);
            });

            // 6. Мультимедиа: Входящий аудиозвонок
            peer.on('call', async (call) => {
                if (confirm(`Входящий P2P вызов от ${call.peer}. Ответить?`)) {
                    try {
                        localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        currentCall = call;
                        call.answer(localAudioStream);
                        showCallUI(true, "Разговор...");
                        
                        call.on('stream', (remoteStream) => {
                            document.getElementById('remoteAudio').srcObject = remoteStream;
                        });
                        call.on('close', hangUpCall);
                    } catch(e) {
                        alert("Не удалось активировать аудио-устройства.");
                    }
                } else {
                    call.close();
                }
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    myUserId = 'peer_' + Math.random().toString(36).substr(2, 6);
                    document.getElementById('myIdField').value = myUserId;
                    localStorage.setItem('p2p_my_id', myUserId);
                    initPeerJS(); 
                } else if (err.type === 'peer-unavailable') {
                    alert(`Собеседник не найден.`);
                    setStatus('Сервер онлайн', 'connected');
                }
            });

            peer.on('disconnected', () => {
                peer.reconnect();
            });
        }

        function updateMyId() {
            const newId = document.getElementById('myIdField').value.trim();
            if (newId && newId !== myUserId) {
                myUserId = newId;
                localStorage.setItem('p2p_my_id', myUserId);
                if (peer) peer.destroy();
                setTimeout(initPeerJS, 500);
            }
        }

        function searchAndConnect() {
            const searchId = document.getElementById('searchIdField').value.trim();
            if (!searchId || searchId === myUserId) return;
            
            if (peer && !peer.disconnected) {
                setStatus(`Соединение с ${searchId}...`);
                const conn = peer.connect(searchId, { reliable: true });
                targetUserId = searchId;
                setupDataChannel(conn);
            }
        }

        function setStatus(text, state = 'default') {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.className = 'status-badge'; 
            if (state === 'connected') statusEl.classList.add('connected');
            if (state === 'typing') statusEl.classList.add('typing');
        }

        function togglePanel() {
            const panel = document.getElementById('p2pPanel');
            if (window.innerWidth <= 680) panel.classList.toggle('open');
            else panel.classList.toggle('collapsed');
        }

        function toggleInterfaceStates(enabled) {
            document.getElementById('msgInput').disabled = !enabled;
            document.getElementById('callBtn').style.display = enabled ? 'block' : 'none';
            const sendBtn = document.getElementById('btnSend');
            sendBtn.disabled = !enabled;
            if(enabled) sendBtn.classList.add('active'); else sendBtn.classList.remove('active');
        }

        // 3. Фича: Автономный Heartbeat (Пинг-Понг статуса соединения)
        function startHeartbeat() {
            stopHeartbeat();
            let missedPings = 0;
            heartbeatInterval = setInterval(() => {
                if (dataChannel && dataChannel.open) {
                    dataChannel.send({ type: 'ping' });
                    missedPings++;
                    if (missedPings > 2) {
                        setStatus("Соединение нестабильно", "default");
                    }
                }
            }, 5000);

            return () => { missedPings = 0; };
        }

        function stopHeartbeat() {
            if(heartbeatInterval) clearInterval(heartbeatInterval);
        }

        function setupDataChannel(conn) {
            dataChannel = conn;
            const resetMissed = startHeartbeat();

            dataChannel.on('open', () => {
                isConnectedState = true;
                setStatus(`В сети с ${targetUserId}`, 'connected');
                toggleInterfaceStates(true);
                document.getElementById('p2pPanel').classList.remove('open');
            });

            dataChannel.on('close', () => {
                isConnectedState = false;
                setStatus('Собеседник отключился', 'default');
                toggleInterfaceStates(false);
                stopHeartbeat();
                dataChannel = null;
            });

            dataChannel.on('data', async (rawData) => {
                const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                
                // Обработка Heartbeat без расшифровки
                if (data.type === 'ping') {
                    if(dataChannel && dataChannel.open) dataChannel.send({ type: 'pong' });
                    return;
                }
                if (data.type === 'pong') {
                    resetMissed();
                    if(document.getElementById('status').innerText === "Соединение нестабильно") {
                        setStatus(`В сети с ${targetUserId}`, 'connected');
                    }
                    return;
                }

                if (data.type === 'typing') {
                    setStatus(data.isTyping ? 'Печатает...' : `В сети с ${targetUserId}`, data.isTyping ? 'typing' : 'connected');
                    return;
                }

                // Расшифровка защищенных пакетов данных
                if (data.encryptedPayload) {
                    const decryptedString = await decryptData(data.encryptedPayload);
                    let decryptedPacket = JSON.parse(decryptedString);

                    if (decryptedPacket.type === 'text') {
                        renderTextMessage(decryptedPacket.payload, 'in', decryptedPacket.id, decryptedPacket.replyTo);
                        saveToStorage({ id: decryptedPacket.id, msgType: 'text', payload: decryptedPacket.payload, side: 'in', replyTo: decryptedPacket.replyTo, reactions: [] });
                    } else if (decryptedPacket.type === 'reaction') {
                        updateReactionOnDOM(decryptedPacket.msgId, decryptedPacket.emoji);
                        updateReactionInStorage(decryptedPacket.msgId, decryptedPacket.emoji);
                    } else if (decryptedPacket.type === 'file-start') {
                        incomingFileBuffer = [];
                        incomingFileName = decryptedPacket.filename;
                        incomingFileType = decryptedPacket.filetype;
                        incomingFileReply = decryptedPacket.replyTo;
                        document.getElementById('p2pProgress').style.display = 'block';
                    } else if (decryptedPacket.type === 'file-chunk') {
                        incomingFileBuffer.push(decryptedPacket.chunk);
                    } else if (decryptedPacket.type === 'file-end') {
                        document.getElementById('p2pProgress').style.display = 'none';
                        const fullPayload = incomingFileBuffer.join('');
                        
                        if (incomingFileType.startsWith('audio/')) {
                            renderVoiceMessage(fullPayload, 'in', decryptedPacket.id, incomingFileReply);
                            saveToStorage({ id: decryptedPacket.id, msgType: 'voice', payload: fullPayload, side: 'in', replyTo: incomingFileReply, reactions: [] });
                        } else {
                            renderFileMessage(incomingFileName, incomingFileType, fullPayload, 'in', decryptedPacket.id, incomingFileReply);
                            saveToStorage({ id: decryptedPacket.id, msgType: 'file', filename: incomingFileName, filetype: incomingFileType, payload: fullPayload, side: 'in', replyTo: incomingFileReply, reactions: [] });
                        }
                        incomingFileBuffer = [];
                    }
                    if(activeTab === 'media') buildSharedMediaTab();
                }
            });
        }

        function sendTypingSignal() {
            if (!dataChannel || !dataChannel.open) return;
            dataChannel.send({ type: 'typing', isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (dataChannel && dataChannel.open) dataChannel.send({ type: 'typing', isTyping: false });
            }, 1500);
        }

        // Отправка обернутого в E2EE пакета
        async function sendEncryptedPacket(packet) {
            const stringified = JSON.stringify(packet);
            const cryptoContainer = await encryptData(stringified);
            if (dataChannel && dataChannel.open) {
                dataChannel.send({ encryptedPayload: cryptoContainer });
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !dataChannel || !dataChannel.open) return;
            
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const packet = { type: 'text', payload: text, id: mId, replyTo: currentReplyTarget };
            
            await sendEncryptedPacket(packet);
            
            renderTextMessage(text, 'out', mId, currentReplyTarget);
            saveToStorage({ id: mId, msgType: 'text', payload: text, side: 'out', replyTo: currentReplyTarget, reactions: [] });
            
            input.value = '';
            cancelReply();
        }

        async function sendMediaDataInChunks(base64Data, filename, mimeType) {
            const mId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            const progressIndicator = document.getElementById('p2pProgress');
            progressIndicator.style.display = 'block';

            await sendEncryptedPacket({
                type: 'file-start', filename: filename, filetype: mimeType, replyTo: currentReplyTarget
            });

            const CHUNK_SIZE = 12000; // Меньший размер чанка снижает накладные расходы криптографии
            let offset = 0;
            
            async function sendNextChunk() {
                while (offset < base64Data.length) {
                    const chunk = base64Data.slice(offset, offset + CHUNK_SIZE);
                    offset += CHUNK_SIZE;
                    const pct = Math.min(100, Math.floor((offset / base64Data.length) * 100));
                    progressIndicator.innerText = `Отправка: ${pct}%`;
                    
                    await sendEncryptedPacket({ type: 'file-chunk', chunk: chunk });
                }

                if (offset >= base64Data.length) {
                    progressIndicator.style.display = 'none';
                    await sendEncryptedPacket({ type: 'file-end', id: mId });
                    
                    if (mimeType.startsWith('audio/')) {
                        renderVoiceMessage(base64Data, 'out', mId, currentReplyTarget);
                        saveToStorage({ id: mId, msgType: 'voice', payload: base64Data, side: 'out', replyTo: currentReplyTarget, reactions: [] });
                    } else {
                        renderFileMessage(filename, mimeType, base64Data, 'out', mId, currentReplyTarget);
                        saveToStorage({ id: mId, msgType: 'file', filename: filename, filetype: mimeType, payload: base64Data, side: 'out', replyTo: currentReplyTarget, reactions: [] });
                    }
                    if(activeTab === 'media') buildSharedMediaTab();
                    cancelReply();
                }
            }
            sendNextChunk();
        }

        function processFileSelection(input) {
            const file = input.files[0];
            if (!file || !dataChannel || !dataChannel.open) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const bytes = new Uint8Array(e.target.result);
                let binary = '';
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                const mime = file.type || "application/octet-stream";
                sendMediaDataInChunks(`data:${mime};base64,` + btoa(binary), file.name, mime);
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        async function toggleVoiceRecord() {
            if (!dataChannel || !dataChannel.open) return;
            const micBtn = document.getElementById('micBtn');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => sendMediaDataInChunks(reader.result, 'voice.webm', 'audio/webm');
                        reader.readAsDataURL(audioBlob);
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                } catch (err) { alert('Микрофон недоступен.'); }
            } else {
                if (mediaRecorder) mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
            }
        }

        // 6. Фича: Инициация P2P звонка (WebRTC Audio Calls)
        async function startAudioCall() {
            if(!dataChannel || !dataChannel.open) return;
            try {
                localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                showCallUI(true, "Вызов пира...");
                
                const call = peer.call(targetUserId, localAudioStream);
                currentCall = call;
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteAudio').srcObject = remoteStream;
                    document.getElementById('callStatusText').innerText = "В разговоре";
                });
                call.on('close', hangUpCall);
            } catch (e) {
                alert("Ошибка захвата микрофона для звонка.");
            }
        }

        function hangUpCall() {
            showCallUI(false);
            if (currentCall) { currentCall.close(); currentCall = null; }
            if (localAudioStream) {
                localAudioStream.getTracks().forEach(track => track.stop());
                localAudioStream = null;
            }
        }

        function showCallUI(show, statusText = "") {
            const overlay = document.getElementById('callOverlay');
            overlay.style.display = show ? 'flex' : 'none';
            if(statusText) document.getElementById('callStatusText').innerText = statusText;
        }

        // 2. Фича: Рендеринг Markdown & Автоссылки
        function parseMarkdownAndLinks(text) {
            // Экранируем теги для безопасности
            let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            // Регулярное выражение для автоссылок
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            safeText = safeText.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
            // Парсинг Markdown через Marked
            return marked.parseInline(safeText);
        }

        function appendReactionsContainer(wrapper, reactions) {
            let container = wrapper.querySelector('.msg-reactions-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'msg-reactions-container';
                wrapper.appendChild(container);
            }
            container.innerHTML = '';
            if (reactions && reactions.length > 0) {
                const counts = {};
                reactions.forEach(r => counts[r] = (counts[r] || 0) + 1);
                for (const [emoji, count] of Object.entries(counts)) {
                    const badge = document.createElement('div');
                    badge.className = 'msg-reaction-badge';
                    badge.innerText = count > 1 ? `${emoji} ${count}` : emoji;
                    container.appendChild(badge);
                }
            } else { container.remove(); }
        }

        function renderTextMessage(text, side, id, replyTo = null, reactions = []) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }
            
            const textContent = document.createElement('span');
            textContent.innerHTML = parseMarkdownAndLinks(text);
            box.appendChild(textContent);
            
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, text, side); });
            wrapper.appendChild(box);
            appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function renderFileMessage(filename, filetype, dataUrl, side, id, replyTo = null, reactions = []) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }

            if (filetype.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = dataUrl;
                box.appendChild(img);
            } else {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                link.className = 'file-link';
                link.innerHTML = `<span>📁 ${filename}</span>`;
                box.appendChild(link);
            }
            
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, filename, side); });
            wrapper.appendChild(box);
            appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function renderVoiceMessage(dataUrl, side, id, replyTo = null, reactions = []) {
            const container = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.setAttribute('data-msg-id', id);
            
            const box = document.createElement('div');
            box.className = 'msg-box';

            if (replyTo) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'reply-quote';
                quoteDiv.innerHTML = `
                    <div class="reply-quote-sender">${replyTo.sender === 'out' ? 'Вы' : 'Пир'}</div>
                    <div class="reply-quote-text">${replyTo.text}</div>
                `;
                box.appendChild(quoteDiv);
            }

            const audio = new Audio(dataUrl);
            const playerDiv = document.createElement('div');
            playerDiv.className = 'tg-voice-player';
            playerDiv.innerHTML = `
                <button class="tg-play-btn">▶</button>
                <div class="tg-voice-info">
                    <div class="tg-timeline"><div class="tg-waveform-bg"><div class="tg-waveform-progress"></div></div></div>
                    <span class="tg-time">0:00</span>
                </div>
            `;

            const playBtn = playerDiv.querySelector('.tg-play-btn');
            const progress = playerDiv.querySelector('.tg-waveform-progress');
            const timeEl = playerDiv.querySelector('.tg-time');
            const timeline = playerDiv.querySelector('.tg-timeline');

            audio.addEventListener('loadedmetadata', () => {
                const min = Math.floor(audio.duration / 60);
                const sec = Math.floor(audio.duration % 60);
                timeEl.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            });
            audio.addEventListener('timeupdate', () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${pct}%`;
                const min = Math.floor(audio.currentTime / 60);
                const sec = Math.floor(audio.currentTime % 60);
                timeEl.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            });
            audio.addEventListener('ended', () => { playBtn.innerText = '▶'; progress.style.width = '0%'; });
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; } else { audio.pause(); playBtn.innerText = '▶'; }
            });
            timeline.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = timeline.getBoundingClientRect();
                audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
            });

            box.appendChild(playerDiv);
            box.addEventListener('click', (e) => { e.stopPropagation(); openContextMenu(e, id, 'Голосовое сообщение', side); });
            wrapper.appendChild(box);
            appendReactionsContainer(wrapper, reactions);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        // 4. Фича: Вкладка «Общие медиа» (Media Shared)
        function buildSharedMediaTab() {
            const grid = document.getElementById('sharedMedia');
            grid.innerHTML = '';
            chatHistory.forEach(msg => {
                if (msg.msgType === 'file') {
                    const thumb = document.createElement('div');
                    thumb.className = 'media-thumb';
                    if (msg.filetype.startsWith('image/')) {
                        thumb.style.backgroundImage = `url(${msg.payload})`;
                        thumb.onclick = () => {
                            const w = window.open();
                            w.document.write(`<img src="${msg.payload}" style="max-width:100%;">`);
                        };
                    } else {
                        thumb.innerText = '📄';
                        thumb.title = msg.filename;
                        thumb.onclick = () => {
                            const a = document.createElement('a');
                            a.href = msg.payload; a.download = msg.filename; a.click();
                        };
                    }
                    grid.appendChild(thumb);
                } else if (msg.msgType === 'voice') {
                    const thumb = document.createElement('div');
                    thumb.className = 'media-thumb';
                    thumb.innerText = '🎵';
                    thumb.onclick = () => { new Audio(msg.payload).play(); };
                    grid.appendChild(thumb);
                }
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabDialogBtn').classList.toggle('active', tab === 'dialog');
            document.getElementById('tabMediaBtn').classList.toggle('active', tab === 'media');
            
            document.getElementById('messages').style.display = tab === 'dialog' ? 'flex' : 'none';
            document.getElementById('sharedMedia').style.display = tab === 'media' ? 'grid' : 'none';
            document.getElementById('inputContainer').style.display = tab === 'dialog' ? 'flex' : 'none';
            document.getElementById('searchWrapper').style.display = tab === 'dialog' ? 'flex' : 'none';

            if (tab === 'media') buildSharedMediaTab();
        }

        // 5. Фича: Локальный поиск по сообщениям
        function handleLocalSearch() {
            const q = document.getElementById('localSearchInput').value.toLowerCase().trim();
            const filtered = chatHistory.filter(msg => {
                if (!q) return true;
                if (msg.msgType === 'text' && msg.payload.toLowerCase().includes(q)) return true;
                if (msg.msgType === 'file' && msg.filename.toLowerCase().includes(q)) return true;
                return false;
            });
            renderAllMessages(filtered);
        }

        function renderAllMessages(historyArray) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            historyArray.forEach(msg => {
                if (msg.msgType === 'text') renderTextMessage(msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions);
                else if (msg.msgType === 'file') renderFileMessage(msg.filename, msg.filetype, msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions);
                else if (msg.msgType === 'voice') renderVoiceMessage(msg.payload, msg.side, msg.id, msg.replyTo, msg.reactions);
            });
        }

        function openContextMenu(e, msgId, textContent, side) {
            const menu = document.getElementById('msgContextMenu');
            activeContextMenuTarget = { id: msgId, text: textContent, sender: side };
            menu.style.display = 'flex';
            let top = e.clientY; let left = e.clientX;
            if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
            if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
            menu.style.top = `${top}px`; menu.style.left = `${left}px`;
        }

        function closeContextMenu() { document.getElementById('msgContextMenu').style.display = 'none'; }
        document.addEventListener('click', closeContextMenu);

        async function triggerReaction(emoji) {
            if (!activeContextMenuTarget) return;
            const tId = activeContextMenuTarget.id;
            
            updateReactionOnDOM(tId, emoji);
            updateReactionInStorage(tId, emoji);
            
            await sendEncryptedPacket({ type: 'reaction', msgId: tId, emoji: emoji });
            closeContextMenu();
        }

        function updateReactionOnDOM(msgId, emoji) {
            const wrapper = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (!wrapper) return;
            const itemInHistory = chatHistory.find(m => m.id === msgId);
            let reactions = itemInHistory ? itemInHistory.reactions : [];
            const idx = reactions.indexOf(emoji);
            if (idx > -1) reactions.splice(idx, 1); else reactions.push(emoji);
            appendReactionsContainer(wrapper, reactions);
        }

        function updateReactionInStorage(msgId, emoji) {
            const index = chatHistory.findIndex(m => m.id === msgId);
            if (index !== -1) {
                if (!chatHistory[index].reactions) chatHistory[index].reactions = [];
                const idx = chatHistory[index].reactions.indexOf(emoji);
                if (idx > -1) chatHistory[index].reactions.splice(idx, 1); else chatHistory[index].reactions.push(emoji);
                localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory));
            }
        }

        function contextCopy() { if (activeContextMenuTarget) navigator.clipboard.writeText(activeContextMenuTarget.text); }
        function contextDelete() {
            if (!activeContextMenuTarget) return;
            const tid = activeContextMenuTarget.id;
            const el = document.querySelector(`[data-msg-id="${tid}"]`);
            if (el) el.remove();
            chatHistory = chatHistory.filter(m => m.id !== tid);
            localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory));
        }

        function contextReply() {
            if (!activeContextMenuTarget) return;
            currentReplyTarget = { id: activeContextMenuTarget.id, text: activeContextMenuTarget.text, sender: activeContextMenuTarget.sender };
            const indicator = document.getElementById('activeReplyIndicator');
            document.getElementById('activeReplySender').innerText = activeContextMenuTarget.sender === 'out' ? 'Ответ на ваше сообщение' : 'Ответ собеседнику';
            document.getElementById('activeReplyText').innerText = activeContextMenuTarget.text;
            indicator.style.display = 'flex';
            document.getElementById('msgInput').focus();
        }

        function contextForward() { console.log("Переслать:", activeContextMenuTarget?.text); }
        function contextPin() { console.log("Закрепить:", activeContextMenuTarget?.text); }
        function cancelReply() { currentReplyTarget = null; document.getElementById('activeReplyIndicator').style.display = 'none'; }

        function saveToStorage(obj) {
            if (!obj.reactions) obj.reactions = [];
            chatHistory.push(obj);
            try { localStorage.setItem('p2p_chat_history', JSON.stringify(chatHistory)); } catch(e) { chatHistory.shift(); }
        }

        function clearHistory() {
            if (confirm("Удалить историю локально?")) {
                localStorage.removeItem('p2p_chat_history'); chatHistory = [];
                document.getElementById('messages').innerHTML = '';
                if(activeTab === 'media') buildSharedMediaTab();
            }
        }

        function updateIceConfig() {
            const type = document.getElementById('iceConfig').value;
            if (type === 'global') {
                currentIceServers = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' }];
            } else if (type === 'google') {
                currentIceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
            } else { currentIceServers = []; }
            if (peer) {
                alert("Сеть будет перезапущена.");
                peer.destroy();
                setTimeout(initPeerJS, 500);
            }
        }
    </script>
